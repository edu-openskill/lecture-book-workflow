<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>표지 디자인 목업 v14 — 슬로건 + 컨셉 6종</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:#111;color:#fff;padding:30px}
  h1{text-align:center;font-size:28px;font-weight:300;margin-bottom:6px}
  .sub{text-align:center;font-size:13px;color:#555;margin-bottom:40px}
  .sec{margin-bottom:60px}
  .sec-t{font-size:20px;font-weight:700;margin-bottom:4px;color:#fff}
  .sec-d{font-size:12px;color:#555;margin-bottom:14px}
  .g{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .c{aspect-ratio:182/257;border-radius:4px;overflow:hidden;position:relative;background:#fff;
    box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .2s}
  .c:hover{transform:scale(1.02)}

  /* 공통 레이어 */
  .typo{position:absolute;inset:0;z-index:10;padding:6% 7%;display:flex;flex-direction:column;pointer-events:none}
  .bg{position:absolute;inset:0;z-index:1;overflow:hidden}
</style>
</head>
<body>

<h1>특이점이 온 개발자 — 표지 목업 v14</h1>
<p class="sub">요약.md 기반 슬로건 + 6가지 디자인 컨셉 / "따라하기 책" 철학 반영</p>

<script>
const books = [
  { id:'docker', color:'#008080', rgb:'0,128,128', title:'Docker', titleSize:'78px',
    tagline:'컨테이너의 모든 것', slogan:'컨테이너 하나로\n세상을 담다',
    descs:['컨테이너가 왜 필요한지 모를 때','Docker Compose로 서비스를 엮고 싶을 때','이야기로 시작하는 입문서가 필요할 때'] },
  { id:'msa', color:'#4B3CB4', rgb:'75,60,180', title:'MSA', titleSize:'88px',
    tagline:'마이크로서비스 아키텍처', slogan:'쪼갤수록\n강해진다',
    descs:['모놀리스의 한계를 느꼈을 때','서비스를 쪼개야 하는 이유를 알고 싶을 때','이벤트 기반 통신을 이해하고 싶을 때'] },
  { id:'rag', color:'#7832A0', rgb:'120,50,160', title:'RAG', titleSize:'88px',
    tagline:'검색 증강 생성', slogan:'AI에게 기억을\n선물하다',
    descs:['LLM이 모르는 것에 답하게 만들고 싶을 때','임베딩과 벡터 검색을 이해하고 싶을 때','AI가 우리 데이터를 활용하게 만들고 싶을 때'] },
  { id:'spring', color:'#B4781E', rgb:'180,120,30', title:'Spring', titleSize:'60px',
    tagline:'9가지 기술', slogan:'인증부터 인가까지\n한 권에 끝내다',
    descs:['OAuth와 OIDC를 제대로 이해하고 싶을 때','Spring Security 설정이 막막할 때','인증/인가의 흐름을 한눈에 보고 싶을 때'] },
];

const seriesSlogans = [
  '읽지 마라, 따라 쳐라',
  '이야기로 시작하고, 코드로 끝내다',
  '개념은 이야기로, 실력은 코드로',
];

// ═══════════ 공통 하단 ═══════════
function botHTML(b) {
  return `<div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto">
    <div style="font-size:7px;color:#a0a0a0;line-height:1.5">OPENSKILL BOOKS<br>오픈스킬북스</div>
    <div style="text-align:right">
      <div style="height:2px;width:30px;margin-left:auto;margin-bottom:3px;background:${b.color}"></div>
      <div style="font-size:16px;font-weight:800;color:${b.color}">개념편</div>
      <div style="font-size:7px;color:#999;margin-top:1px">류재성 지음</div>
    </div>
  </div>`;
}

// ═══════════ 1. 슬로건 히어로 — 시리즈 슬로건 대형 + 타이틀 ═══════════
function style1(b) {
  return `<div class="c">
    <div class="bg" style="background:linear-gradient(160deg, #fafafa 0%, #f0f0f0 100%)"></div>
    <div class="typo">
      <div style="text-align:right;font-size:8px;color:#8c8c8c;line-height:1.7;margin-bottom:4px">${b.descs.join('<br>')}</div>
      <div style="font-size:10px;font-weight:600;color:${b.color};letter-spacing:2px;margin-bottom:8px">특이점이 온 개발자</div>
      <div style="font-size:20px;font-weight:800;color:#1a1a1a;line-height:1.3;white-space:pre-line;margin-bottom:12px">${b.slogan}</div>
      <div style="flex:1;display:flex;align-items:center">
        <div style="position:relative">
          <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.85;color:#e8e8e8">${b.title}</div>
          <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.85;color:#1a1a1a;position:absolute;top:0;left:0;transform:translate(-2px,-2px)">${b.title}</div>
        </div>
      </div>
      <div style="font-size:9px;color:#888;margin-bottom:6px">${b.tagline}</div>
      ${botHTML(b)}
    </div>
  </div>`;
}

// ═══════════ 2. 코드 에디터 — 코드 스니펫 배경 + 타이포 ═══════════
function codeSnippet(b) {
  const snippets = {
    docker: 'docker run -d\n  --name app\n  -p 8080:8080\n  myapp:latest\n\ndocker compose up',
    msa: '@KafkaListener\npublic void handle(\n  OrderEvent e) {\n  // 보상 트랜잭션\n  service.process(e);\n}',
    rag: 'embedding = model\n  .encode(query)\n\nresults = vector_db\n  .search(embedding,\n    top_k=5)',
    spring: '@EnableWebSecurity\npublic class Config {\n  oauth2Login()\n  .userInfoEndpoint()\n  .oidcUserService()\n}',
  };
  return snippets[b.id] || '';
}

function style2(b) {
  const lines = codeSnippet(b).split('\n');
  const codeHTML = lines.map((l,i)=>`<div style="display:flex;gap:8px;opacity:.18"><span style="color:${b.color};width:14px;text-align:right;flex-shrink:0">${i+1}</span><span style="color:#333">${l.replace(/ /g,'&nbsp;')}</span></div>`).join('');
  return `<div class="c">
    <div class="bg" style="background:#fafafa;padding:32% 8% 0;font-family:'SF Mono','Fira Code',monospace;font-size:7px;line-height:1.7">${codeHTML}</div>
    <div class="typo">
      <div style="font-size:9px;font-weight:600;color:${b.color};letter-spacing:1px;margin-bottom:2px">특이점이 온 개발자</div>
      <div style="flex:1;display:flex;align-items:flex-start;padding-top:10%">
        <div>
          <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.85;color:#1a1a1a">${b.title}</div>
          <div style="font-size:9px;color:#888;margin-top:4px">${b.tagline}</div>
        </div>
      </div>
      <div style="font-size:11px;font-weight:700;color:${b.color};line-height:1.4;white-space:pre-line;margin-bottom:8px">${b.slogan}</div>
      ${botHTML(b)}
    </div>
  </div>`;
}

// ═══════════ 3. 스텝 바이 스텝 — 따라하기 철학, 번호 스텝 ═══════════
function style3(b) {
  const steps = {
    docker: ['Dockerfile 작성','이미지 빌드','컨테이너 실행'],
    msa: ['모놀리스 분리','게이트웨이 연결','이벤트 통신'],
    rag: ['문서 임베딩','벡터 검색','답변 생성'],
    spring: ['OAuth2 설정','토큰 발급','인가 처리'],
  };
  const s = steps[b.id] || ['1','2','3'];
  const stepsHTML = s.map((st,i)=>`<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
    <div style="width:18px;height:18px;border-radius:50%;background:${b.color};color:#fff;font-size:8px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:.7">${i+1}</div>
    <div style="font-size:8px;color:#666;font-weight:500">${st}</div>
  </div>`).join('');

  return `<div class="c">
    <div class="bg" style="background:#fff"></div>
    <div class="typo">
      <div style="font-size:9px;font-weight:700;color:${b.color};letter-spacing:1px">특이점이 온 개발자</div>
      <div style="font-size:7px;color:#aaa;margin-top:1px;margin-bottom:10px">읽지 마라, 따라 쳐라</div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
        <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.85;color:#1a1a1a;margin-bottom:10px">${b.title}</div>
        <div style="font-size:9px;color:#888;margin-bottom:12px">${b.tagline}</div>
        <div style="border-left:2px solid ${b.color};padding-left:8px;opacity:.9">
          ${stepsHTML}
        </div>
      </div>
      <div style="font-size:10px;font-weight:700;color:#333;line-height:1.4;white-space:pre-line;margin-bottom:6px">${b.slogan}</div>
      ${botHTML(b)}
    </div>
  </div>`;
}

// ═══════════ 4. 캐릭터 실루엣 자리 — 캐릭터 영역 표시 + 슬로건 ═══════════
function style4(b) {
  // 캐릭터 영역을 점선 박스로 표시 (실제 캐릭터는 Gemini로 생성 예정)
  const icons = {
    docker: `<svg viewBox="0 0 80 60" style="width:100%;height:100%">
      <ellipse cx="40" cy="38" rx="28" ry="16" fill="${b.color}" opacity=".15"/>
      <ellipse cx="25" cy="33" rx="6" ry="4" fill="${b.color}" opacity=".12"/>
      <rect x="26" y="20" width="8" height="6" rx="1" fill="${b.color}" opacity=".2"/>
      <rect x="36" y="20" width="8" height="6" rx="1" fill="${b.color}" opacity=".25"/>
      <rect x="46" y="20" width="8" height="6" rx="1" fill="${b.color}" opacity=".2"/>
      <rect x="31" y="12" width="8" height="6" rx="1" fill="${b.color}" opacity=".18"/>
      <rect x="41" y="12" width="8" height="6" rx="1" fill="${b.color}" opacity=".15"/>
      <circle cx="52" cy="33" r="2.5" fill="#fff"/>
      <circle cx="52.5" cy="33" r="1.2" fill="#333" opacity=".4"/>
    </svg>`,
    msa: `<svg viewBox="0 0 80 60" style="width:100%;height:100%">
      <circle cx="40" cy="18" r="10" fill="${b.color}" opacity=".15" stroke="${b.color}" stroke-width="1.5" opacity=".3"/>
      <circle cx="18" cy="42" r="8" fill="${b.color}" opacity=".12" stroke="${b.color}" stroke-width="1.5" opacity=".25"/>
      <circle cx="62" cy="42" r="8" fill="${b.color}" opacity=".12" stroke="${b.color}" stroke-width="1.5" opacity=".25"/>
      <line x1="35" y1="27" x2="22" y2="35" stroke="${b.color}" stroke-width="1.5" opacity=".2"/>
      <line x1="45" y1="27" x2="58" y2="35" stroke="${b.color}" stroke-width="1.5" opacity=".2"/>
      <line x1="26" y1="44" x2="54" y2="44" stroke="${b.color}" stroke-width="1" opacity=".15"/>
    </svg>`,
    rag: `<svg viewBox="0 0 80 60" style="width:100%;height:100%">
      <rect x="8" y="25" width="32" height="28" rx="2" fill="${b.color}" opacity=".12" stroke="${b.color}" stroke-width="1.5" opacity=".2"/>
      <line x1="24" y1="25" x2="24" y2="53" stroke="${b.color}" stroke-width="1" opacity=".15"/>
      <circle cx="55" cy="22" r="14" fill="none" stroke="${b.color}" stroke-width="2" opacity=".25"/>
      <line x1="65" y1="32" x2="74" y2="44" stroke="${b.color}" stroke-width="3" opacity=".2" stroke-linecap="round"/>
      <line x1="42" y1="10" x2="40" y2="4" stroke="${b.color}" stroke-width="1.5" opacity=".15"/>
      <line x1="55" y1="6" x2="55" y2="0" stroke="${b.color}" stroke-width="1.5" opacity=".15"/>
      <line x1="68" y1="10" x2="70" y2="4" stroke="${b.color}" stroke-width="1.5" opacity=".15"/>
    </svg>`,
    spring: `<svg viewBox="0 0 80 60" style="width:100%;height:100%">
      <circle cx="32" cy="30" r="14" fill="${b.color}" opacity=".1" stroke="${b.color}" stroke-width="1.5" opacity=".25"/>
      <circle cx="32" cy="30" r="8" fill="#fff" stroke="${b.color}" stroke-width="1" opacity=".15"/>
      ${[0,60,120,180,240,300].map(a=>`<rect x="29" y="13" width="6" height="5" rx="1" fill="${b.color}" opacity=".18" transform="rotate(${a},32,30)"/>`).join('')}
      <circle cx="58" cy="22" r="9" fill="${b.color}" opacity=".08" stroke="${b.color}" stroke-width="1.5" opacity=".2"/>
      ${[0,72,144,216,288].map(a=>`<rect x="56" y="11" width="4" height="4" rx="1" fill="${b.color}" opacity=".12" transform="rotate(${a},58,22)"/>`).join('')}
    </svg>`,
  };

  return `<div class="c">
    <div class="bg" style="background:#fff"></div>
    <div class="typo">
      <div style="text-align:right;font-size:8px;color:#8c8c8c;line-height:1.7;margin-bottom:4px">${b.descs.join('<br>')}</div>
      <div style="display:flex;align-items:baseline;gap:2px;margin-bottom:2px">
        <span style="font-size:28px;font-weight:800;color:#1e1e1e;line-height:.95">특</span>
        <span style="font-size:16px;font-weight:700;color:#555">이점이</span>
        <span style="font-size:28px;font-weight:800;color:#1e1e1e;line-height:.95;margin-left:4px">온</span>
      </div>
      <div style="font-size:22px;font-weight:800;color:#2a2a2a;margin-bottom:4px">개발자</div>
      <!-- 캐릭터 영역 -->
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center">
        <div style="width:70%;aspect-ratio:4/3;border:2px dashed rgba(${b.rgb},.3);border-radius:8px;display:flex;align-items:center;justify-content:center;position:relative">
          ${icons[b.id]}
          <div style="position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);background:#fff;padding:0 4px;font-size:6px;color:${b.color};white-space:nowrap">GEMINI CHARACTER HERE</div>
        </div>
      </div>
      <div style="font-size:${parseInt(b.titleSize)*0.9}px;font-weight:900;letter-spacing:-2px;line-height:.85;color:#1a1a1a;margin-bottom:2px">${b.title}</div>
      <div style="font-size:9px;color:#888;margin-bottom:6px">${b.tagline}</div>
      ${botHTML(b)}
    </div>
  </div>`;
}

// ═══════════ 5. 컬러 블록 슬로건 — 하단 컬러 밴드에 슬로건 ═══════════
function style5(b) {
  return `<div class="c">
    <div class="bg">
      <div style="position:absolute;bottom:0;left:0;right:0;height:32%;background:${b.color};opacity:.08"></div>
    </div>
    <div class="typo">
      <div style="font-size:9px;font-weight:600;color:${b.color};letter-spacing:2px;margin-bottom:4px">특이점이 온 개발자</div>
      <div style="flex:1;display:flex;flex-direction:column;justify-content:center">
        <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.85;color:#1a1a1a">${b.title}</div>
        <div style="font-size:9px;color:#888;margin-top:4px;margin-bottom:16px">${b.tagline}</div>
        <div style="width:30px;height:2px;background:${b.color};margin-bottom:6px"></div>
        <div style="font-size:13px;font-weight:700;color:#333;line-height:1.45;white-space:pre-line">${b.slogan}</div>
      </div>
      <div style="background:${b.color};color:#fff;padding:5px 0;margin:0 -7%;padding-left:7%;padding-right:7%;margin-bottom:0;margin-top:8px">
        <div style="font-size:8px;font-weight:600;letter-spacing:1px;margin-bottom:1px">이야기로 시작하고, 코드로 끝내다</div>
      </div>
      <div style="margin-top:6px">${botHTML(b)}</div>
    </div>
  </div>`;
}

// ═══════════ 6. 듀얼 톤 — 상단 화이트(타이틀) + 하단 컬러(슬로건) ═══════════
function style6(b) {
  return `<div class="c">
    <div class="bg">
      <div style="position:absolute;bottom:0;left:0;right:0;height:42%;background:${b.color}"></div>
    </div>
    <div class="typo">
      <div style="text-align:right;font-size:8px;color:#8c8c8c;line-height:1.7;margin-bottom:4px">${b.descs.join('<br>')}</div>
      <div style="display:flex;align-items:baseline;gap:2px;margin-bottom:2px">
        <span style="font-size:28px;font-weight:800;color:#1e1e1e;line-height:.95">특</span>
        <span style="font-size:16px;font-weight:700;color:#555">이점이</span>
        <span style="font-size:28px;font-weight:800;color:#1e1e1e;line-height:.95;margin-left:4px">온</span>
      </div>
      <div style="font-size:22px;font-weight:800;color:#2a2a2a;margin-bottom:4px">개발자</div>
      <div style="flex:1;display:flex;align-items:flex-end;padding-bottom:6%">
        <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.85;color:#1a1a1a">${b.title}</div>
      </div>
      <!-- 하단 컬러 영역 -->
      <div style="color:#fff;margin-top:auto">
        <div style="font-size:14px;font-weight:800;line-height:1.4;white-space:pre-line;margin-bottom:6px">${b.slogan}</div>
        <div style="font-size:8px;opacity:.7;margin-bottom:8px">${b.tagline}</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end">
          <div style="font-size:7px;opacity:.6;line-height:1.5">OPENSKILL BOOKS<br>오픈스킬북스</div>
          <div style="text-align:right">
            <div style="font-size:14px;font-weight:800">개념편</div>
            <div style="font-size:7px;opacity:.7;margin-top:1px">류재성 지음</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// ═══════════ 렌더 ═══════════
const sections = [
  { name:'1 — 슬로건 히어로', desc:'책별 슬로건이 주인공 / 시리즈명 상단 작게 / 타이틀 고스트+솔리드 / 미니멀 화이트', fn:style1 },
  { name:'2 — 코드 에디터', desc:'실제 코드 스니펫이 배경 텍스처 / "따라하기 책" 철학 반영 / 에디터 라인넘버 느낌', fn:style2 },
  { name:'3 — 스텝 바이 스텝', desc:'"읽지 마라, 따라 쳐라" / 3단계 스텝 표시 / 왼쪽 컬러 바 / 과정 중심', fn:style3 },
  { name:'4 — 캐릭터 실루엣', desc:'v4.5 레이아웃 + 캐릭터 영역(점선) / Gemini로 생성할 자리 / SVG 실루엣 미리보기', fn:style4 },
  { name:'5 — 컬러 밴드 슬로건', desc:'하단 컬러 밴드에 시리즈 슬로건 / 중앙에 책별 슬로건 / 깔끔한 2톤', fn:style5 },
  { name:'6 — 듀얼 톤', desc:'상단 화이트(타이틀) + 하단 풀컬러(슬로건) / 강한 대비 / 서점 눈에 띄는 스타일', fn:style6 },
];

let html = '';
sections.forEach(sec => {
  html += `<div class="sec"><div class="sec-t">${sec.name}</div><div class="sec-d">${sec.desc}</div><div class="g">`;
  books.forEach(b => { html += sec.fn(b); });
  html += '</div></div>';
});
document.currentScript.insertAdjacentHTML('afterend', html);
</script>

</body>
</html>
