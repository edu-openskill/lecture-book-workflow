<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>표지 디자인 목업 v12 — v4.5 레이아웃 + 인터랙티브 배경</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard','Inter',-apple-system,sans-serif;background:#111;color:#fff;padding:30px}
  h1{text-align:center;font-size:28px;font-weight:300;margin-bottom:6px}
  .sub{text-align:center;font-size:13px;color:#555;margin-bottom:40px}
  .sec{margin-bottom:60px}
  .sec-t{font-size:20px;font-weight:700;margin-bottom:4px;color:#fff}
  .sec-d{font-size:12px;color:#555;margin-bottom:14px}
  .g{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .c{aspect-ratio:182/257;border-radius:4px;overflow:hidden;position:relative;background:#fff;
    box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .2s}
  .c:hover{transform:scale(1.02)}

  /* ── v4.5 타이포 공통 레이어 ── */
  .typo{position:absolute;inset:0;z-index:10;padding:6% 7%;display:flex;flex-direction:column;pointer-events:none}
  .top-descs{text-align:right;font-size:8px;color:#8c8c8c;line-height:1.7;margin-bottom:6px}
  .series{margin-bottom:0}
  .series .line1{display:flex;align-items:baseline;gap:2px}
  .series .tk{font-size:38px;font-weight:800;color:#1e1e1e;line-height:.95}
  .series .mid{font-size:22px;font-weight:700;color:#555;margin-left:1px}
  .series .on{font-size:38px;font-weight:800;color:#1e1e1e;margin-left:8px;line-height:.95}
  .series .dev{font-size:32px;font-weight:800;color:#2a2a2a;margin-top:2px}
  .main-title{flex:1;display:flex;align-items:center;position:relative}
  .main-title .shadow{position:absolute;color:#ebebeb;z-index:1}
  .main-title .solid{position:relative;z-index:2}
  .tagline{font-size:9px;color:#888;margin-top:2px}
  .bot-area{display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto}
  .bot-area .left{font-size:7px;color:#a0a0a0;line-height:1.5}
  .bot-area .left .pub{color:#bbb}
  .bot-area .right{text-align:right}
  .bot-area .right .accent-line{height:2px;width:30px;margin-left:auto;margin-bottom:3px}
  .bot-area .right .sub-t{font-size:16px;font-weight:800}
  .bot-area .right .auth{font-size:7px;color:#999;margin-top:1px}

  /* ── 배경 레이어 ── */
  .bg{position:absolute;inset:0;z-index:1;overflow:hidden}

  /* ── 1. 플로팅 도형 ── */
  @keyframes float1{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(10px,-15px) rotate(180deg)}}
  @keyframes float2{0%,100%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(-8px,12px) rotate(-120deg)}}
  @keyframes float3{0%,100%{transform:translate(0,0)}50%{transform:translate(5px,-8px)}}
  .shape{position:absolute;opacity:.08;animation-duration:8s;animation-iteration-count:infinite;animation-timing-function:ease-in-out}
  .c:hover .shape{opacity:.18;transition:opacity .3s}

  /* ── 2. 회로 패턴 ── */
  @keyframes pulse{0%,100%{opacity:.06}50%{opacity:.15}}
  .circuit-dot{position:absolute;width:4px;height:4px;border-radius:50%;animation:pulse 3s infinite}
  .circuit-line{position:absolute;height:1px;animation:pulse 3s infinite}
  .c:hover .circuit-dot,.c:hover .circuit-line{animation-duration:1s}

  /* ── 3. 파티클 ── */
  @keyframes drift{0%{transform:translateY(0) translateX(0)}100%{transform:translateY(-100%) translateX(20px)}}
  .particle{position:absolute;width:3px;height:3px;border-radius:50%;opacity:.07;animation:drift linear infinite}
  .c:hover .particle{opacity:.18}

  /* ── 4. 아이소메트릭 블록 ── */
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  .iso{position:absolute;opacity:.06;animation:bob 4s ease-in-out infinite}
  .c:hover .iso{opacity:.15;transition:opacity .3s}

  /* ── 5. 캐릭터 ── */
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes wiggle{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  .mascot{position:absolute;opacity:.1;transition:all .4s}
  .c:hover .mascot{opacity:.25;transform:scale(1.1)}

  /* ── 6. 물결 ── */
  @keyframes wave-move{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  .wave-bg{position:absolute;width:200%;height:100%;animation:wave-move 12s linear infinite;opacity:.04}
  .c:hover .wave-bg{opacity:.1;transition:opacity .3s}
</style>
</head>
<body>

<h1>특이점이 온 개발자 — 표지 목업 v12</h1>
<p class="sub">v4.5 레이아웃 고정 + 인터랙티브 배경 6종 / hover로 배경 반응</p>

<script>
// 책 데이터
const books = [
  { id:'docker', color:'#008080', rgb:'0,128,128', title:'Docker', titleSize:'88px', tagline:'컨테이너의 모든 것',
    descs:['컨테이너가 왜 필요한지 모를 때','Docker Compose로 서비스를 엮고 싶을 때','이야기로 시작하는 입문서가 필요할 때'] },
  { id:'msa', color:'#4B3CB4', rgb:'75,60,180', title:'MSA', titleSize:'100px', tagline:'마이크로서비스 아키텍처',
    descs:['모놀리스의 한계를 느꼈을 때','서비스를 쪼개야 하는 이유를 알고 싶을 때','이벤트 기반 통신을 이해하고 싶을 때'] },
  { id:'rag', color:'#7832A0', rgb:'120,50,160', title:'RAG', titleSize:'100px', tagline:'검색 증강 생성',
    descs:['LLM이 모르는 것에 답하게 만들고 싶을 때','임베딩과 벡터 검색을 이해하고 싶을 때','AI가 우리 데이터를 활용하게 만들고 싶을 때'] },
  { id:'spring', color:'#B4781E', rgb:'180,120,30', title:'Spring', titleSize:'68px', tagline:'9가지 기술',
    descs:['OAuth와 OIDC를 제대로 이해하고 싶을 때','Spring Security 설정이 막막할 때','인증/인가의 흐름을 한눈에 보고 싶을 때'] },
];

// v4.5 타이포 레이어 생성
function typoHTML(b) {
  return `
  <div class="typo">
    <div class="top-descs">${b.descs.join('<br>')}</div>
    <div class="series">
      <div class="line1">
        <span class="tk">특</span><span class="mid">이점이</span><span class="on">온</span>
      </div>
      <div class="dev">개발자</div>
    </div>
    <div class="main-title">
      <div class="shadow" style="font-size:${b.titleSize};font-weight:900;letter-spacing:-4px;line-height:.8;top:52%;left:2px;transform:translate(6px,6px)">${b.title}</div>
      <div class="solid" style="font-size:${b.titleSize};font-weight:900;letter-spacing:-4px;line-height:.8;color:#1a1a1a">${b.title}</div>
    </div>
    <div class="tagline">${b.tagline}</div>
    <div class="bot-area">
      <div class="left">OPENSKILL BOOKS<br><span class="pub">오픈스킬북스</span></div>
      <div class="right">
        <div class="accent-line" style="background:${b.color}"></div>
        <div class="sub-t" style="color:${b.color}">개념편</div>
        <div class="auth">류재성 지음</div>
      </div>
    </div>
  </div>`;
}

// ═══════════ 배경 생성 함수들 ═══════════

// 1. 플로팅 도형
function bgShapes(b) {
  const shapes = [];
  const c = b.rgb;
  // 원
  for(let i=0;i<6;i++){
    const s = 20+Math.random()*50;
    shapes.push(`<div class="shape" style="width:${s}px;height:${s}px;border-radius:50%;background:rgba(${c},.3);
      top:${10+Math.random()*70}%;left:${5+Math.random()*80}%;animation-name:float${1+i%3};animation-delay:${i*.5}s"></div>`);
  }
  // 삼각형
  for(let i=0;i<4;i++){
    const s = 15+Math.random()*30;
    shapes.push(`<div class="shape" style="width:0;height:0;border-left:${s}px solid transparent;border-right:${s}px solid transparent;
      border-bottom:${s*1.7}px solid rgba(${c},.25);top:${Math.random()*80}%;left:${Math.random()*85}%;
      animation-name:float${1+i%3};animation-delay:${i*.7}s"></div>`);
  }
  // 사각형
  for(let i=0;i<3;i++){
    const s = 18+Math.random()*35;
    shapes.push(`<div class="shape" style="width:${s}px;height:${s}px;background:rgba(${c},.2);
      top:${Math.random()*75}%;left:${Math.random()*80}%;animation-name:float${1+i%3};animation-delay:${i*.4}s;
      border-radius:3px;transform:rotate(${Math.random()*45}deg)"></div>`);
  }
  return `<div class="bg">${shapes.join('')}</div>`;
}

// 2. 회로 패턴
function bgCircuit(b) {
  const els = [];
  const c = b.rgb;
  // 점
  for(let i=0;i<20;i++){
    const x=5+Math.random()*85, y=5+Math.random()*85;
    els.push(`<div class="circuit-dot" style="top:${y}%;left:${x}%;background:rgba(${c},.5);animation-delay:${i*.2}s"></div>`);
  }
  // 선
  for(let i=0;i<12;i++){
    const w=20+Math.random()*80, x=Math.random()*70, y=Math.random()*90;
    const angle = [0,90,45,-45][i%4];
    els.push(`<div class="circuit-line" style="width:${w}px;top:${y}%;left:${x}%;background:rgba(${c},.15);
      transform:rotate(${angle}deg);animation-delay:${i*.3}s"></div>`);
  }
  return `<div class="bg">${els.join('')}</div>`;
}

// 3. 파티클 필드
function bgParticles(b) {
  const els = [];
  const c = b.rgb;
  for(let i=0;i<30;i++){
    const s = 2+Math.random()*4;
    const dur = 5+Math.random()*10;
    els.push(`<div class="particle" style="width:${s}px;height:${s}px;background:rgba(${c},.4);
      bottom:${-10+Math.random()*10}%;left:${Math.random()*95}%;animation-duration:${dur}s;animation-delay:${Math.random()*dur}s"></div>`);
  }
  return `<div class="bg">${els.join('')}</div>`;
}

// 4. 아이소메트릭 블록 (SVG)
function bgIso(b) {
  const els = [];
  const c = b.color;
  for(let i=0;i<8;i++){
    const s = 20+Math.random()*40;
    const x = 5+Math.random()*80, y = 10+Math.random()*70;
    // 간단한 다이아몬드 (아이소메트릭 큐브 면)
    els.push(`<svg class="iso" style="top:${y}%;left:${x}%;width:${s}px;height:${s}px;animation-delay:${i*.5}s" viewBox="0 0 40 40">
      <polygon points="20,2 38,12 20,22 2,12" fill="${c}" opacity=".3"/>
      <polygon points="2,12 20,22 20,38 2,28" fill="${c}" opacity=".2"/>
      <polygon points="38,12 20,22 20,38 38,28" fill="${c}" opacity=".15"/>
    </svg>`);
  }
  return `<div class="bg">${els.join('')}</div>`;
}

// 5. 캐릭터 마스코트 (SVG)
function bgMascot(b) {
  let svg = '';
  if(b.id==='docker') {
    // 고래 캐릭터 (Docker whale 영감)
    svg = `<svg class="mascot" style="bottom:15%;right:5%;width:120px;height:90px;animation:bounce 3s infinite" viewBox="0 0 120 90">
      <ellipse cx="60" cy="55" rx="50" ry="30" fill="${b.color}" opacity=".4"/>
      <ellipse cx="35" cy="48" rx="8" ry="6" fill="${b.color}" opacity=".3"/>
      <circle cx="78" cy="42" r="4" fill="#fff" opacity=".5"/>
      <circle cx="79" cy="42" r="2" fill="#333" opacity=".4"/>
      <!-- 컨테이너 박스들 -->
      <rect x="42" y="28" width="10" height="8" rx="1" fill="${b.color}" opacity=".35"/>
      <rect x="55" y="28" width="10" height="8" rx="1" fill="${b.color}" opacity=".3"/>
      <rect x="68" y="28" width="10" height="8" rx="1" fill="${b.color}" opacity=".25"/>
      <rect x="48" y="18" width="10" height="8" rx="1" fill="${b.color}" opacity=".3"/>
      <rect x="61" y="18" width="10" height="8" rx="1" fill="${b.color}" opacity=".25"/>
      <!-- 물줄기 -->
      <path d="M25,38 Q15,30 20,22 Q25,15 22,8" fill="none" stroke="${b.color}" stroke-width="2" opacity=".2"/>
    </svg>`;
  } else if(b.id==='msa') {
    // 네트워크 노드 캐릭터
    svg = `<svg class="mascot" style="bottom:12%;right:3%;width:130px;height:110px;animation:wiggle 4s infinite" viewBox="0 0 130 110">
      <circle cx="65" cy="35" r="16" fill="none" stroke="${b.color}" stroke-width="2" opacity=".3"/>
      <circle cx="30" cy="75" r="12" fill="none" stroke="${b.color}" stroke-width="2" opacity=".25"/>
      <circle cx="100" cy="75" r="12" fill="none" stroke="${b.color}" stroke-width="2" opacity=".25"/>
      <circle cx="65" cy="95" r="10" fill="none" stroke="${b.color}" stroke-width="2" opacity=".2"/>
      <line x1="65" y1="51" x2="38" y2="66" stroke="${b.color}" stroke-width="1.5" opacity=".2"/>
      <line x1="65" y1="51" x2="92" y2="66" stroke="${b.color}" stroke-width="1.5" opacity=".2"/>
      <line x1="37" y1="85" x2="58" y2="90" stroke="${b.color}" stroke-width="1.5" opacity=".15"/>
      <line x1="93" y1="85" x2="72" y2="90" stroke="${b.color}" stroke-width="1.5" opacity=".15"/>
      <!-- 눈 -->
      <circle cx="60" cy="33" r="2.5" fill="${b.color}" opacity=".3"/>
      <circle cx="70" cy="33" r="2.5" fill="${b.color}" opacity=".3"/>
      <path d="M59,40 Q65,44 71,40" fill="none" stroke="${b.color}" stroke-width="1.5" opacity=".25"/>
    </svg>`;
  } else if(b.id==='rag') {
    // 돋보기+책 캐릭터
    svg = `<svg class="mascot" style="bottom:12%;right:4%;width:110px;height:110px;animation:bounce 3.5s infinite" viewBox="0 0 110 110">
      <!-- 책 -->
      <rect x="20" y="50" width="50" height="40" rx="3" fill="none" stroke="${b.color}" stroke-width="2" opacity=".25"/>
      <line x1="45" y1="50" x2="45" y2="90" stroke="${b.color}" stroke-width="1.5" opacity=".2"/>
      <line x1="28" y1="60" x2="40" y2="60" stroke="${b.color}" stroke-width="1" opacity=".15"/>
      <line x1="28" y1="66" x2="40" y2="66" stroke="${b.color}" stroke-width="1" opacity=".15"/>
      <line x1="28" y1="72" x2="38" y2="72" stroke="${b.color}" stroke-width="1" opacity=".15"/>
      <!-- 돋보기 -->
      <circle cx="72" cy="35" r="18" fill="none" stroke="${b.color}" stroke-width="2.5" opacity=".3"/>
      <line x1="84" y1="48" x2="98" y2="65" stroke="${b.color}" stroke-width="3" opacity=".25" stroke-linecap="round"/>
      <!-- 눈 -->
      <circle cx="67" cy="33" r="2.5" fill="${b.color}" opacity=".25"/>
      <circle cx="77" cy="33" r="2.5" fill="${b.color}" opacity=".25"/>
      <!-- 빛 -->
      <path d="M60,20 L58,12" stroke="${b.color}" stroke-width="1.5" opacity=".15"/>
      <path d="M72,15 L72,8" stroke="${b.color}" stroke-width="1.5" opacity=".15"/>
      <path d="M84,20 L87,13" stroke="${b.color}" stroke-width="1.5" opacity=".15"/>
    </svg>`;
  } else {
    // 기어+스프링 캐릭터
    svg = `<svg class="mascot" style="bottom:12%;right:3%;width:120px;height:110px;animation:wiggle 3s infinite" viewBox="0 0 120 110">
      <!-- 큰 기어 -->
      <circle cx="55" cy="50" r="22" fill="none" stroke="${b.color}" stroke-width="2" opacity=".25"/>
      <circle cx="55" cy="50" r="14" fill="none" stroke="${b.color}" stroke-width="1.5" opacity=".2"/>
      <!-- 기어 톱니 -->
      <rect x="51" y="25" width="8" height="8" rx="1" fill="${b.color}" opacity=".15" transform="rotate(0,55,50)"/>
      <rect x="51" y="25" width="8" height="8" rx="1" fill="${b.color}" opacity=".15" transform="rotate(60,55,50)"/>
      <rect x="51" y="25" width="8" height="8" rx="1" fill="${b.color}" opacity=".15" transform="rotate(120,55,50)"/>
      <rect x="51" y="25" width="8" height="8" rx="1" fill="${b.color}" opacity=".15" transform="rotate(180,55,50)"/>
      <rect x="51" y="25" width="8" height="8" rx="1" fill="${b.color}" opacity=".15" transform="rotate(240,55,50)"/>
      <rect x="51" y="25" width="8" height="8" rx="1" fill="${b.color}" opacity=".15" transform="rotate(300,55,50)"/>
      <!-- 작은 기어 -->
      <circle cx="88" cy="38" r="13" fill="none" stroke="${b.color}" stroke-width="1.5" opacity=".2"/>
      <!-- 스프링 -->
      <path d="M30,75 Q20,80 30,85 Q40,90 30,95" fill="none" stroke="${b.color}" stroke-width="2" opacity=".2"/>
      <!-- 눈 -->
      <circle cx="50" cy="47" r="2.5" fill="${b.color}" opacity=".25"/>
      <circle cx="60" cy="47" r="2.5" fill="${b.color}" opacity=".25"/>
      <path d="M49,54 Q55,58 61,54" fill="none" stroke="${b.color}" stroke-width="1.5" opacity=".2"/>
    </svg>`;
  }

  // 추가 작은 도형
  const extras = [];
  for(let i=0;i<5;i++){
    const s=5+Math.random()*12;
    extras.push(`<div class="shape" style="width:${s}px;height:${s}px;border-radius:${Math.random()>.5?'50%':'2px'};
      background:rgba(${b.rgb},.15);top:${15+Math.random()*50}%;left:${10+Math.random()*60}%;
      animation-name:float${1+i%3};animation-delay:${i*.6}s"></div>`);
  }

  return `<div class="bg">${svg}${extras.join('')}</div>`;
}

// 6. 물결 그라데이션
function bgWaves(b) {
  const c = b.rgb;
  return `<div class="bg">
    <svg class="wave-bg" style="bottom:0" viewBox="0 0 1440 400" preserveAspectRatio="none">
      <path d="M0,300 C360,200 720,350 1080,250 C1260,200 1440,280 1440,280 L1440,400 L0,400Z" fill="rgba(${c},.15)"/>
      <path d="M0,320 C240,280 480,360 720,300 C960,240 1200,320 1440,300 L1440,400 L0,400Z" fill="rgba(${c},.1)"/>
    </svg>
    <svg class="wave-bg" style="bottom:0;animation-delay:-6s;animation-direction:reverse" viewBox="0 0 1440 400" preserveAspectRatio="none">
      <path d="M0,310 C300,260 600,340 900,280 C1100,240 1300,300 1440,290 L1440,400 L0,400Z" fill="rgba(${c},.12)"/>
    </svg>
    ${Array.from({length:8},(_,i)=>{
      const s=3+Math.random()*5;
      return `<div class="particle" style="width:${s}px;height:${s}px;border-radius:50%;background:rgba(${c},.15);
        bottom:${Math.random()*40}%;left:${Math.random()*90}%;animation-duration:${6+Math.random()*8}s;animation-delay:${Math.random()*5}s"></div>`;
    }).join('')}
  </div>`;
}

// ═══════════ 섹션 생성 ═══════════
const sections = [
  { name:'1 — 플로팅 도형', desc:'원, 삼각형, 사각형이 천천히 떠다님 / hover 시 더 진하게 / 각 책 컬러 반영', fn:bgShapes },
  { name:'2 — 회로 패턴', desc:'점과 선이 맥박처럼 깜빡임 / 테크 느낌 / hover 시 빠르게 깜빡', fn:bgCircuit },
  { name:'3 — 파티클 필드', desc:'작은 입자가 아래서 위로 떠오름 / 데이터 시각화 느낌 / hover 시 진하게', fn:bgParticles },
  { name:'4 — 아이소메트릭 블록', desc:'3D 큐브가 둥실둥실 / 컨테이너/블록 메타포 / hover 시 나타남', fn:bgIso },
  { name:'5 — 캐릭터 마스코트', desc:'각 책별 SVG 캐릭터 (고래/네트워크/돋보기/기어) / hover 시 커지고 진해짐', fn:bgMascot },

];
