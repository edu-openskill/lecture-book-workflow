<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>표지 디자인 목업 v15 — 슬로건 히어로 풀 타이포</title>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Pretendard',-apple-system,sans-serif;background:#111;color:#fff;padding:30px}
  h1{text-align:center;font-size:28px;font-weight:300;margin-bottom:6px}
  .sub{text-align:center;font-size:13px;color:#555;margin-bottom:40px}
  .g{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:60px}
  .sec-t{font-size:20px;font-weight:700;margin-bottom:4px;color:#fff}
  .sec-d{font-size:12px;color:#555;margin-bottom:14px}
  .c{aspect-ratio:182/257;border-radius:4px;overflow:hidden;position:relative;background:#fff;
    box-shadow:0 8px 30px rgba(0,0,0,.5);transition:transform .2s}
  .c:hover{transform:scale(1.02)}
  .typo{position:absolute;inset:0;z-index:10;padding:5% 6%;display:flex;flex-direction:column;pointer-events:none}

  /* 배지 */
  .badges{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px}
  .badge{font-size:6.5px;font-weight:600;padding:2px 6px;border-radius:10px;white-space:nowrap}
</style>
</head>
<body>

<h1>특이점이 온 개발자 — 표지 목업 v15</h1>
<p class="sub">슬로건 히어로 확장 / 여백 최소 + 텍스트 꽉 채움 + 기술 키워드 배지</p>

<script>
const books = [
  { id:'docker', color:'#008080', rgb:'0,128,128', title:'Docker', titleSize:'82px',
    tagline:'컨테이너의 모든 것',
    slogan:'컨테이너 하나로\n세상을 담다',
    badges:['Dockerfile','이미지 빌드','컨테이너','Docker Compose','볼륨 마운트','네트워크','멀티 스테이지','레지스트리'] },
  { id:'msa', color:'#4B3CB4', rgb:'75,60,180', title:'MSA', titleSize:'94px',
    tagline:'마이크로서비스 아키텍처',
    slogan:'쪼갤수록\n강해진다',
    badges:['API Gateway','Kafka','보상 트랜잭션','서비스 분리','이벤트 드리븐','오케스트레이션','WebSocket','SAGA 패턴'] },
  { id:'rag', color:'#7832A0', rgb:'120,50,160', title:'RAG', titleSize:'94px',
    tagline:'검색 증강 생성',
    slogan:'AI에게 기억을\n선물하다',
    badges:['임베딩','벡터 DB','LLM','프롬프트','청킹','유사도 검색','LangChain','토큰'] },
  { id:'spring', color:'#B4781E', rgb:'180,120,30', title:'Spring', titleSize:'62px',
    tagline:'9가지 기술',
    slogan:'인증부터 인가까지\n한 권에 끝내다',
    badges:['OAuth2','OIDC','JWT','Spring Security','소셜 로그인','권한 관리','세션','필터 체인'] },
];

function badgesHTML(b) {
  return b.badges.map(t =>
    `<span class="badge" style="background:rgba(${b.rgb},.12);color:${b.color}">${t}</span>`
  ).join('');
}

function botHTML(b) {
  return `<div style="display:flex;justify-content:space-between;align-items:flex-end">
    <div style="font-size:7px;color:#a0a0a0;line-height:1.5">OPENSKILL BOOKS<br>오픈스킬북스</div>
    <div style="text-align:right">
      <div style="height:2px;width:30px;margin-left:auto;margin-bottom:3px;background:${b.color}"></div>
      <div style="font-size:14px;font-weight:800;color:${b.color}">개념편</div>
      <div style="font-size:7px;color:#999;margin-top:1px">류재성 지음</div>
    </div>
  </div>`;
}

// ═══════════ Style A — 세로 스택 (시리즈명 큼 + 슬로건 큼 + 타이틀 큼) ═══════════
function styleA(b) {
  return `<div class="c">
    <div class="typo" style="padding:4% 5%;justify-content:space-between">
      <!-- 시리즈명 크게 -->
      <div>
        <div style="font-size:30px;font-weight:900;color:#1a1a1a;line-height:1.05;letter-spacing:-1px">특이점이 온<br>개발자</div>
      </div>
      <!-- 슬로건 크게 -->
      <div style="margin:2px 0">
        <div style="font-size:22px;font-weight:800;color:${b.color};line-height:1.25;white-space:pre-line">${b.slogan}</div>
      </div>
      <!-- 메인 타이틀 -->
      <div>
        <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.82;color:#1a1a1a">${b.title}</div>
        <div style="font-size:8px;color:#888;margin-top:3px">${b.tagline}</div>
      </div>
      <!-- 배지 -->
      <div class="badges" style="margin-top:4px">${badgesHTML(b)}</div>
      <!-- 하단 -->
      ${botHTML(b)}
    </div>
  </div>`;
}

// ═══════════ Style B — 타이틀 상단 + 슬로건 중앙 대형 + 배지 하단 ═══════════
function styleB(b) {
  return `<div class="c">
    <div class="typo" style="padding:4% 5%;justify-content:space-between">
      <!-- 상단: 시리즈명 + 타이틀 나란히 -->
      <div>
        <div style="font-size:10px;font-weight:700;color:${b.color};letter-spacing:1px;margin-bottom:2px">특이점이 온 개발자</div>
        <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.82;color:#1a1a1a">${b.title}</div>
        <div style="font-size:8px;color:#888;margin-top:2px">${b.tagline}</div>
      </div>
      <!-- 중앙: 슬로건 초대형 -->
      <div style="flex:1;display:flex;align-items:center">
        <div style="font-size:28px;font-weight:900;color:#1a1a1a;line-height:1.2;white-space:pre-line;letter-spacing:-1px">${b.slogan}</div>
      </div>
      <!-- 배지 -->
      <div class="badges">${badgesHTML(b)}</div>
      <!-- 하단 -->
      <div style="margin-top:4px">${botHTML(b)}</div>
    </div>
  </div>`;
}

// ═══════════ Style C — 전면 컬러 배경 + 화이트 텍스트 ═══════════
function styleC(b) {
  return `<div class="c" style="background:${b.color}">
    <div class="typo" style="padding:4% 5%;justify-content:space-between">
      <div>
        <div style="font-size:28px;font-weight:900;color:rgba(255,255,255,.95);line-height:1.05;letter-spacing:-1px">특이점이 온<br>개발자</div>
      </div>
      <div>
        <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.82;color:#fff">${b.title}</div>
        <div style="font-size:8px;color:rgba(255,255,255,.6);margin-top:3px">${b.tagline}</div>
      </div>
      <div>
        <div style="font-size:22px;font-weight:800;color:rgba(255,255,255,.9);line-height:1.25;white-space:pre-line">${b.slogan}</div>
      </div>
      <!-- 배지 화이트 -->
      <div class="badges">${b.badges.map(t =>
        `<span class="badge" style="background:rgba(255,255,255,.2);color:#fff">${t}</span>`
      ).join('')}</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end">
        <div style="font-size:7px;color:rgba(255,255,255,.5);line-height:1.5">OPENSKILL BOOKS<br>오픈스킬북스</div>
        <div style="text-align:right">
          <div style="height:2px;width:30px;margin-left:auto;margin-bottom:3px;background:rgba(255,255,255,.4)"></div>
          <div style="font-size:14px;font-weight:800;color:#fff">개념편</div>
          <div style="font-size:7px;color:rgba(255,255,255,.5);margin-top:1px">류재성 지음</div>
        </div>
      </div>
    </div>
  </div>`;
}

// ═══════════ Style D — 대각 분할 (좌상 타이틀 / 우하 슬로건) ═══════════
function styleD(b) {
  return `<div class="c">
    <div style="position:absolute;inset:0;z-index:1">
      <div style="position:absolute;bottom:0;right:0;width:100%;height:45%;background:${b.color};opacity:.06"></div>
    </div>
    <div class="typo" style="padding:4% 5%;justify-content:space-between">
      <div>
        <div style="font-size:26px;font-weight:900;color:#1a1a1a;line-height:1.05;letter-spacing:-1px">특이점이 온<br>개발자</div>
        <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.82;color:#1a1a1a;margin-top:4px">${b.title}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:24px;font-weight:800;color:${b.color};line-height:1.25;white-space:pre-line">${b.slogan}</div>
        <div style="font-size:8px;color:#888;margin-top:3px">${b.tagline}</div>
      </div>
      <div class="badges" style="justify-content:flex-end">${badgesHTML(b)}</div>
      ${botHTML(b)}
    </div>
  </div>`;
}

// ═══════════ Style E — 극대형 시리즈명 배경 + 오버레이 ═══════════
function styleE(b) {
  return `<div class="c">
    <div style="position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;overflow:hidden">
      <div style="font-size:120px;font-weight:900;color:rgba(${b.rgb},.04);line-height:.85;white-space:nowrap;letter-spacing:-8px;transform:rotate(-8deg)">특이점</div>
    </div>
    <div class="typo" style="padding:4% 5%;justify-content:space-between">
      <div>
        <div style="font-size:26px;font-weight:900;color:#1a1a1a;line-height:1.05">특이점이 온<br>개발자</div>
      </div>
      <div>
        <div style="font-size:24px;font-weight:800;color:${b.color};line-height:1.25;white-space:pre-line">${b.slogan}</div>
      </div>
      <div>
        <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.82;color:#1a1a1a">${b.title}</div>
        <div style="font-size:8px;color:#888;margin-top:3px">${b.tagline}</div>
      </div>
      <div class="badges">${badgesHTML(b)}</div>
      ${botHTML(b)}
    </div>
  </div>`;
}

// ═══════════ Style F — 하단 컬러 밴드 (배지+슬로건) + 상단 풀 타이포 ═══════════
function styleF(b) {
  return `<div class="c">
    <div style="position:absolute;bottom:0;left:0;right:0;height:30%;background:${b.color};z-index:1"></div>
    <div class="typo" style="padding:4% 5%;justify-content:space-between">
      <div>
        <div style="font-size:28px;font-weight:900;color:#1a1a1a;line-height:1.05;letter-spacing:-1px">특이점이 온<br>개발자</div>
      </div>
      <div>
        <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.82;color:#1a1a1a">${b.title}</div>
        <div style="font-size:8px;color:#888;margin-top:3px">${b.tagline}</div>
      </div>
      <!-- 하단 컬러 영역 -->
      <div style="color:#fff;margin-top:auto">
        <div style="font-size:18px;font-weight:800;line-height:1.25;white-space:pre-line;margin-bottom:4px">${b.slogan}</div>
        <div class="badges">${b.badges.map(t =>
          `<span class="badge" style="background:rgba(255,255,255,.2);color:#fff">${t}</span>`
        ).join('')}</div>
        <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-top:5px">
          <div style="font-size:7px;opacity:.6;line-height:1.5">OPENSKILL BOOKS<br>오픈스킬북스</div>
          <div style="text-align:right">
            <div style="font-size:14px;font-weight:800">개념편</div>
            <div style="font-size:7px;opacity:.6;margin-top:1px">류재성 지음</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

const sections = [
  { name:'A — 세로 스택', desc:'시리즈명(30px) → 슬로건(22px) → 타이틀 → 배지 / 전부 크고 여백 최소', fn:styleA },
  { name:'B — 타이틀 톱 + 슬로건 센터', desc:'타이틀 상단 배치 / 슬로건 28px 초대형 중앙 / 배지 하단', fn:styleB },
  { name:'C — 풀 컬러 배경', desc:'각 책 액센트 컬러 전면 / 화이트 텍스트 / 배지 반투명', fn:styleC },
  { name:'D — 대각 구도', desc:'좌상단 시리즈+타이틀 / 우하단 슬로건 / 비대칭 긴장감', fn:styleD },
  { name:'E — 워터마크 배경', desc:'"특이점" 초대형 워터마크 / 그 위에 풀 타이포 스택', fn:styleE },
  { name:'F — 컬러 밴드 하단', desc:'상단 화이트(시리즈+타이틀) / 하단 30% 컬러밴드(슬로건+배지)', fn:styleF },
];

let html = '';
sections.forEach(sec => {
  html += `<div class="sec-t">${sec.name}</div><div class="sec-d">${sec.desc}</div><div class="g">`;
  books.forEach(b => { html += sec.fn(b); });
  html += '</div>';
});
document.currentScript.insertAdjacentHTML('afterend', html);
</script>

<script>
// ═══════════ 추가 G~L — 다양한 배치 ═══════════

const books2 = [
  { id:'docker', color:'#008080', rgb:'0,128,128', title:'Docker', titleSize:'82px',
    tagline:'컨테이너의 모든 것', slogan:'컨테이너 하나로\n세상을 담다',
    badges:['Dockerfile','이미지 빌드','컨테이너','Docker Compose','볼륨 마운트','네트워크','멀티 스테이지','레지스트리'] },
  { id:'msa', color:'#4B3CB4', rgb:'75,60,180', title:'MSA', titleSize:'94px',
    tagline:'마이크로서비스 아키텍처', slogan:'쪼갤수록\n강해진다',
    badges:['API Gateway','Kafka','보상 트랜잭션','서비스 분리','이벤트 드리븐','오케스트레이션','WebSocket','SAGA 패턴'] },
  { id:'rag', color:'#7832A0', rgb:'120,50,160', title:'RAG', titleSize:'94px',
    tagline:'검색 증강 생성', slogan:'AI에게 기억을\n선물하다',
    badges:['임베딩','벡터 DB','LLM','프롬프트','청킹','유사도 검색','LangChain','토큰'] },
  { id:'spring', color:'#B4781E', rgb:'180,120,30', title:'Spring', titleSize:'62px',
    tagline:'9가지 기술', slogan:'인증부터 인가까지\n한 권에 끝내다',
    badges:['OAuth2','OIDC','JWT','Spring Security','소셜 로그인','권한 관리','세션','필터 체인'] },
];

function badgesHTML2(b, style) {
  if(style==='white') return b.badges.map(t=>`<span class="badge" style="background:rgba(255,255,255,.2);color:#fff">${t}</span>`).join('');
  if(style==='outline') return b.badges.map(t=>`<span class="badge" style="border:1px solid rgba(${b.rgb},.3);color:${b.color};background:transparent">${t}</span>`).join('');
  return b.badges.map(t=>`<span class="badge" style="background:rgba(${b.rgb},.12);color:${b.color}">${t}</span>`).join('');
}

function bot2(b, white) {
  if(white) return `<div style="display:flex;justify-content:space-between;align-items:flex-end">
    <div style="font-size:7px;color:rgba(255,255,255,.5);line-height:1.5">OPENSKILL BOOKS<br>오픈스킬북스</div>
    <div style="text-align:right"><div style="font-size:14px;font-weight:800;color:#fff">개념편</div><div style="font-size:7px;color:rgba(255,255,255,.5);margin-top:1px">류재성 지음</div></div></div>`;
  return `<div style="display:flex;justify-content:space-between;align-items:flex-end">
    <div style="font-size:7px;color:#a0a0a0;line-height:1.5">OPENSKILL BOOKS<br>오픈스킬북스</div>
    <div style="text-align:right"><div style="height:2px;width:30px;margin-left:auto;margin-bottom:3px;background:${b.color}"></div><div style="font-size:14px;font-weight:800;color:${b.color}">개념편</div><div style="font-size:7px;color:#999;margin-top:1px">류재성 지음</div></div></div>`;
}

// ═══════════ G — 센터 정렬 전체 ═══════════
function styleG(b) {
  return `<div class="c">
    <div style="position:absolute;inset:0;z-index:1;display:flex;align-items:center;justify-content:center;overflow:hidden">
      <div style="font-size:160px;font-weight:900;color:rgba(${b.rgb},.035);line-height:.75;letter-spacing:-10px">${b.title}</div>
    </div>
    <div class="typo" style="padding:4% 5%;align-items:center;text-align:center;justify-content:space-between">
      <div style="font-size:11px;font-weight:700;color:${b.color};letter-spacing:2px">특이점이 온 개발자</div>
      <div>
        <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.82;color:#1a1a1a">${b.title}</div>
        <div style="font-size:8px;color:#888;margin-top:3px">${b.tagline}</div>
      </div>
      <div style="font-size:22px;font-weight:800;color:#1a1a1a;line-height:1.25;white-space:pre-line">${b.slogan}</div>
      <div class="badges" style="justify-content:center">${badgesHTML2(b)}</div>
      ${bot2(b)}
    </div>
  </div>`;
}

// ═══════════ H — 우측 정렬 + 좌측 컬러 사이드바 ═══════════
function styleH(b) {
  return `<div class="c">
    <div style="position:absolute;top:0;left:0;bottom:0;width:8%;background:${b.color};z-index:1"></div>
    <div class="typo" style="padding:4% 5% 4% 12%;text-align:right;justify-content:space-between">
      <div style="font-size:24px;font-weight:900;color:#1a1a1a;line-height:1.05">특이점이 온<br>개발자</div>
      <div>
        <div style="font-size:${b.titleSize};font-weight:900;letter-spacing:-3px;line-height:.82;color:#1a1a1a">${b.title}</div>
        <div style="font-size:8px;color:#888;margin-top:3px">${b.tagline}</div>
      </div>
      <div style="font-size:20px;font-weight:800;color:${b.color};line-height:1.25;white-space:pre-line">${b.slogan}</div>
      <div class="badges" style="justify-content:flex-end">${badgesHTML2(b)}</div>
      ${bot2(b)}
    </div>
  </div>`;
}

// ═══════════ I — 상하 2분할 (상단 컬러+시리즈 / 하단 화이트+타이틀) ═══════════
function styleI(b) {
  return `<div class="c">
    <div style="position:absolute;top:0;left:0;right:0;height:38%;background:${b.color};z-index:1"></div>
    <div class="typo" style="padding:4% 5%;justify-content:space-between">
      <!-- 상단 컬러 영역 -->
      <div style="color:#fff">
        <div style="font-size:24px;font-weight:900;line-height:1.05">특이점이 온<br>개발자</div>
        <div style="font-size:13px;font-weight:700;opacity:.8;margin-top:4px;white-space:pre-line">${b.slogan}</div>
      </div>
      <!-- 하단 화이트 영역 -->
