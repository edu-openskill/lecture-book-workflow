<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>그림 5-13 한 단계 샘플 v6</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: #f8fafc;
    margin: 0;
    padding: 40px 24px;
    color: #1f2937;
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  h1 { font-size: 18px; margin: 0 0 24px; color: #0f172a; }
  .stage {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 20px 22px 22px;
  }
  .caption {
    text-align: center;
    font-style: italic;
    color: #64748b;
    font-size: 13px;
    margin-top: 18px;
  }
  .svg-figure svg { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<div class="wrap">

<h1>그림 5-13 — etcd 명시 v6</h1>

<div class="stage">
  <div class="svg-figure">
    <svg viewBox="0 0 760 290" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ingress 리소스는 클러스터 안의 etcd에 저장된 데이터이고, Ingress 컨트롤러가 이를 미리 읽어 두었다가 외부 요청을 Service로 전달합니다">
      <defs>
        <marker id="v6-arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#1f2937"/></marker>
        <marker id="v6-dash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#475569"/></marker>
      </defs>

      <!-- etcd 외곽 박스 (상단) -->
      <rect x="220" y="15" width="320" height="125" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4,3"/>
      <text x="380" y="33" text-anchor="middle" font-size="11" font-weight="700" fill="#64748b">etcd · 클러스터 저장소</text>

      <!-- 내부: Ingress 리소스 박스 -->
      <rect x="245" y="48" width="270" height="80" rx="6" fill="#fff" stroke="#475569" stroke-width="1.6"/>
      <path d="M 253 48 H 507 Q 515 48 515 56 V 68 H 245 V 56 Q 245 48 253 48 Z" fill="#475569"/>
      <text x="380" y="62" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Ingress 리소스 (YAML)</text>
      <text x="255" y="90" font-size="10" font-family="monospace" fill="#0f172a">/order   → order-service</text>
      <text x="255" y="110" font-size="10" font-family="monospace" fill="#0f172a">/stores  → stores-service</text>

      <!-- watch 점선 화살표 (etcd → 컨트롤러) -->
      <line x1="380" y1="142" x2="380" y2="178" stroke="#475569" stroke-width="1.6" stroke-dasharray="6,4" marker-end="url(#v6-dash)"/>
      <text x="392" y="158" font-size="10" font-style="italic" fill="#475569">미리 읽음</text>

      <!-- 외부 요청 (좌측 사람 아이콘) -->
      <g transform="translate(60, 195)">
        <circle cx="0" cy="0" r="13" fill="#fff" stroke="#475569" stroke-width="1.6"/>
        <path d="M -20 32 Q -20 11 0 11 Q 20 11 20 32 L 20 50 L -20 50 Z" fill="#fff" stroke="#475569" stroke-width="1.6"/>
      </g>
      <text x="60" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">외부 요청</text>

      <line x1="82" y1="210" x2="288" y2="210" stroke="#1f2937" stroke-width="1.6" marker-end="url(#v6-arrow)"/>

      <!-- Ingress 컨트롤러 (가운데) -->
      <rect x="290" y="180" width="180" height="80" rx="6" fill="#fff" stroke="#ff7849" stroke-width="2"/>
      <path d="M 298 180 H 462 Q 470 180 470 188 V 200 H 290 V 188 Q 290 180 298 180 Z" fill="#ff7849"/>
      <text x="380" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Ingress 컨트롤러</text>

      <!-- 컨트롤러 → Service 화살표 -->
      <line x1="470" y1="210" x2="558" y2="210" stroke="#1f2937" stroke-width="1.6" marker-end="url(#v6-arrow)"/>

      <!-- Service (우측) -->
      <rect x="560" y="180" width="180" height="80" rx="6" fill="#fff" stroke="#475569" stroke-width="1.6"/>
      <path d="M 568 180 H 732 Q 740 180 740 188 V 200 H 560 V 188 Q 560 180 568 180 Z" fill="#475569"/>
      <text x="650" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Service</text>
    </svg>
  </div>

  <div class="caption">그림 5-13. Ingress 리소스는 클러스터 안의 etcd에 저장된 라우팅 데이터입니다. Ingress 컨트롤러가 이를 미리 읽어 두고, 외부 요청을 Service로 전달합니다</div>
</div>

</div>
</body>
</html>
