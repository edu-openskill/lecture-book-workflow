    <text x="620" y="266" text-anchor="middle" font-size="11" font-style="italic" fill="#047857">자동 생성</text>

    <text x="380" y="305" text-anchor="middle" font-size="11" font-style="italic" fill="#475569">Pod 2가 종료되면 Deployment가 즉시 Pod 3을 띄워 다시 2개를 유지합니다.</text>
  </svg>

    <path d="M 516 160 L 724 160 Q 730 160 730 166 L 730 180 L 510 180 L 510 166 Q 510 160 516 160 Z" fill="#ff7849"/>
    <text x="620" y="174" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">Pod 2</text>
    <text x="620" y="206" text-anchor="middle" font-size="11" font-style="italic" fill="#7b341e">실행 중</text>
    <text x="380" y="250" text-anchor="middle" font-size="11" font-style="italic" fill="#475569">Pod가 사라지면 Deployment가 같은 모양의 Pod를 다시 띄워 원래대로 맞춥니다.</text>
