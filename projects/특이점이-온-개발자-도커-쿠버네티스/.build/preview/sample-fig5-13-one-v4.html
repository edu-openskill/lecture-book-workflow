<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>그림 5-13 한 단계 샘플 v4</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: #f8fafc;
    margin: 0;
    padding: 40px 24px;
    color: #1f2937;
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  h1 { font-size: 18px; margin: 0 0 24px; color: #0f172a; }
  .stage {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 20px 22px 22px;
  }
  .caption {
    text-align: center;
    font-style: italic;
    color: #64748b;
    font-size: 13px;
    margin-top: 18px;
  }
  .svg-figure svg { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<div class="wrap">

<h1>그림 5-13 — 한 단계 샘플 v4 (외부 요청 위치 조정)</h1>

<div class="stage">
  <div class="svg-figure">
    <svg viewBox="0 0 800 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ingress Controller가 Ingress 리소스를 미리 읽어 내부 라우팅 설정으로 갖고 있다가, 외부 요청이 오면 그 설정으로 Service에 즉시 분기">
      <defs>
        <marker id="v4-arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#1f2937"/></marker>
        <marker id="v4-dash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#475569"/></marker>
      </defs>

      <text x="400" y="20" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">Ingress Controller는 Ingress 리소스를 미리 읽어 두고 외부 요청을 Service로 분기합니다</text>

      <!-- Ingress 리소스 (상단) -->
      <rect x="310" y="30" width="180" height="80" rx="6" fill="#fff" stroke="#475569" stroke-width="1.6"/>
      <path d="M 318 30 H 482 Q 490 30 490 38 V 50 H 310 V 38 Q 310 30 318 30 Z" fill="#475569"/>
      <text x="400" y="44" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Ingress 리소스 (YAML)</text>
      <text x="320" y="72" font-size="10" font-family="monospace" fill="#0f172a">/order   → order-service</text>
      <text x="320" y="92" font-size="10" font-family="monospace" fill="#0f172a">/stores  → stores-service</text>

      <!-- watch 점선 화살표 -->
      <line x1="400" y1="112" x2="400" y2="158" stroke="#475569" stroke-width="1.6" stroke-dasharray="6,4" marker-end="url(#v4-dash)"/>
      <text x="412" y="130" font-size="11" font-weight="700" fill="#475569">watch</text>
      <text x="412" y="146" font-size="9" font-style="italic" fill="#94a3b8">변경 시 미리 읽음</text>

      <!-- 외부 요청 (좌측 사람 아이콘 — 박스 중심선 y=200에 맞춤) -->
      <g transform="translate(70, 185)">
        <circle cx="0" cy="0" r="13" fill="#fff" stroke="#475569" stroke-width="1.6"/>
        <path d="M -20 32 Q -20 11 0 11 Q 20 11 20 32 L 20 50 L -20 50 Z" fill="#fff" stroke="#475569" stroke-width="1.6"/>
      </g>
      <text x="70" y="255" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">외부 요청</text>

      <line x1="92" y1="200" x2="308" y2="200" stroke="#1f2937" stroke-width="1.6" marker-end="url(#v4-arrow)"/>
      <text x="200" y="192" text-anchor="middle" font-size="10" font-style="italic" fill="#6b7280">/order, /stores</text>

      <!-- Ingress Controller (가운데) -->
      <rect x="310" y="160" width="180" height="80" rx="6" fill="#fff" stroke="#ff7849" stroke-width="2"/>
      <path d="M 318 160 H 482 Q 490 160 490 168 V 180 H 310 V 168 Q 310 160 318 160 Z" fill="#ff7849"/>
      <text x="400" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Ingress Controller</text>
      <text x="400" y="202" text-anchor="middle" font-size="11" font-weight="700" fill="#7b341e">내부 라우팅 설정</text>
      <text x="400" y="222" text-anchor="middle" font-size="9" font-style="italic" fill="#94a3b8">(Ingress 리소스 미리 읽음)</text>

      <!-- Controller → Service 화살표 -->
      <line x1="490" y1="200" x2="588" y2="200" stroke="#1f2937" stroke-width="1.6" marker-end="url(#v4-arrow)"/>
      <text x="539" y="192" text-anchor="middle" font-size="10" font-style="italic" fill="#6b7280">즉시 분기</text>

      <!-- Service (우측) -->
      <rect x="590" y="160" width="180" height="80" rx="6" fill="#fff" stroke="#475569" stroke-width="1.6"/>
      <path d="M 598 160 H 762 Q 770 160 770 168 V 180 H 590 V 168 Q 590 160 598 160 Z" fill="#475569"/>
      <text x="680" y="174" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Service</text>
      <text x="680" y="208" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">Pod 묶음 앞의</text>
      <text x="680" y="224" text-anchor="middle" font-size="10" font-style="italic" fill="#64748b">고정 진입점</text>
    </svg>
  </div>

  <div class="caption">그림 5-13. Ingress Controller는 Ingress 리소스를 미리 읽어 내부 라우팅 설정으로 갖고 있다가, 외부 요청이 오면 그 설정으로 Service에 즉시 분기합니다</div>
</div>

</div>
</body>
</html>
