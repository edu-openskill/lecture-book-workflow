<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>그림 5-13 한 단계 샘플 v5</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: #f8fafc;
    margin: 0;
    padding: 40px 24px;
    color: #1f2937;
  }
  .wrap { max-width: 920px; margin: 0 auto; }
  h1 { font-size: 18px; margin: 0 0 24px; color: #0f172a; }
  .stage {
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    padding: 20px 22px 22px;
  }
  .caption {
    text-align: center;
    font-style: italic;
    color: #64748b;
    font-size: 13px;
    margin-top: 18px;
  }
  .svg-figure svg { display: block; width: 100%; height: auto; }
</style>
</head>
<body>
<div class="wrap">

<h1>그림 5-13 — 한 단계 샘플 v5 (단순화)</h1>

<div class="stage">
  <div class="svg-figure">
    <svg viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ingress는 Ingress 리소스(YAML)와 Ingress 컨트롤러 두 가지로 구성됩니다. 컨트롤러가 리소스를 미리 읽고, 외부 요청을 Service로 전달합니다.">
      <defs>
        <marker id="v5-arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#1f2937"/></marker>
        <marker id="v5-dash" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#475569"/></marker>
      </defs>

      <!-- Ingress 리소스 (상단) -->
      <rect x="270" y="20" width="180" height="80" rx="6" fill="#fff" stroke="#475569" stroke-width="1.6"/>
      <path d="M 278 20 H 442 Q 450 20 450 28 V 40 H 270 V 28 Q 270 20 278 20 Z" fill="#475569"/>
      <text x="360" y="34" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Ingress 리소스 (YAML)</text>
      <text x="280" y="62" font-size="10" font-family="monospace" fill="#0f172a">/order   → order-service</text>
      <text x="280" y="82" font-size="10" font-family="monospace" fill="#0f172a">/stores  → stores-service</text>

      <!-- watch 점선 화살표 (Resource → Controller) -->
      <line x1="360" y1="102" x2="360" y2="148" stroke="#475569" stroke-width="1.6" stroke-dasharray="6,4" marker-end="url(#v5-dash)"/>
      <text x="372" y="128" font-size="10" font-style="italic" fill="#475569">리소스 미리 읽음</text>

      <!-- 외부 요청 (좌측 사람 아이콘) -->
      <g transform="translate(60, 175)">
        <circle cx="0" cy="0" r="13" fill="#fff" stroke="#475569" stroke-width="1.6"/>
        <path d="M -20 32 Q -20 11 0 11 Q 20 11 20 32 L 20 50 L -20 50 Z" fill="#fff" stroke="#475569" stroke-width="1.6"/>
      </g>
      <text x="60" y="245" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">외부 요청</text>

      <line x1="82" y1="190" x2="268" y2="190" stroke="#1f2937" stroke-width="1.6" marker-end="url(#v5-arrow)"/>

      <!-- Ingress 컨트롤러 (가운데) -->
      <rect x="270" y="150" width="180" height="80" rx="6" fill="#fff" stroke="#ff7849" stroke-width="2"/>
      <path d="M 278 150 H 442 Q 450 150 450 158 V 170 H 270 V 158 Q 270 150 278 150 Z" fill="#ff7849"/>
      <text x="360" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Ingress 컨트롤러</text>

      <!-- Controller → Service 화살표 -->
      <line x1="450" y1="190" x2="538" y2="190" stroke="#1f2937" stroke-width="1.6" marker-end="url(#v5-arrow)"/>

      <!-- Service (우측) -->
      <rect x="540" y="150" width="180" height="80" rx="6" fill="#fff" stroke="#475569" stroke-width="1.6"/>
      <path d="M 548 150 H 712 Q 720 150 720 158 V 170 H 540 V 158 Q 540 150 548 150 Z" fill="#475569"/>
      <text x="630" y="164" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Service</text>
    </svg>
  </div>

  <div class="caption">그림 5-13. Ingress 컨트롤러는 Ingress 리소스를 미리 읽어 두고, 외부 요청을 Service로 전달합니다</div>
</div>

</div>
</body>
</html>
