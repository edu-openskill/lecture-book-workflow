<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>그림 3-10 샘플 — 택배 분류 비유</title>
<style>
  body { background:#eef0f2; padding:48px 24px; font-family:'Malgun Gothic','맑은 고딕',sans-serif; }
  .svg-figure { background:#fff; padding:24px 16px; max-width:760px; margin:0 auto; border:1px solid #e2e8f0; border-radius:10px; }
  .caption { text-align:center; color:#64748b; font-style:italic; font-size:14px; margin:14px auto 0; max-width:760px; }
</style>
</head>
<body>
<div class="svg-figure">
<svg viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="택배 분류 센터에 빗댄 NGINX 설정 — 주소 확인 후 지정 센터로 분류">
  <defs>
    <marker id="m1" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#475569"/></marker>
    <marker id="m2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#ff7849"/></marker>
  </defs>
  <text x="360" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2937">택배 분류 센터처럼 — 주소를 확인해 알맞은 센터로 보낸다</text>

  <g transform="translate(40,120)" stroke="#475569" fill="none" stroke-linejoin="round">
    <path d="M0 16 L36 3 L72 16 L72 58 L0 58 Z" fill="#fff" stroke-width="1.8"/>
    <path d="M0 16 L36 3 L72 16 L36 29 Z" fill="#f1f5f9" stroke-width="1.4"/>
    <line x1="36" y1="29" x2="36" y2="58" stroke-width="1"/>
    <rect x="18" y="36" width="36" height="15" fill="#fff" stroke-width="1.2"/>
    <text x="36" y="47" text-anchor="middle" font-size="9" fill="#6b7280" stroke="none">주소?</text>
  </g>
  <text x="76" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">택배(요청) 도착</text>

  <line x1="116" y1="150" x2="158" y2="150" stroke="#475569" stroke-width="1.6" marker-end="url(#m1)"/>

  <g transform="translate(178,122)" stroke="#ff7849" fill="none" stroke-width="2.2" stroke-linecap="round">
    <circle cx="26" cy="26" r="24" fill="#fff4ed"/>
    <line x1="43" y1="43" x2="60" y2="60"/>
    <path d="M16 26 L24 33 L37 19" stroke-width="2"/>
  </g>
  <text x="204" y="200" text-anchor="middle" font-size="12" font-weight="700" font-family="monospace" fill="#7b341e">location</text>
  <text x="204" y="216" text-anchor="middle" font-size="10" fill="#6b7280">주소(URL) 확인</text>

  <line x1="246" y1="140" x2="520" y2="80" stroke="#ff7849" stroke-width="1.8" marker-end="url(#m2)"/>
  <line x1="246" y1="158" x2="520" y2="214" stroke="#ff7849" stroke-width="1.8" marker-end="url(#m2)"/>
  <text x="372" y="96" text-anchor="middle" font-size="11" font-weight="700" font-family="monospace" fill="#7b341e">proxy_pass</text>
  <text x="372" y="110" text-anchor="middle" font-size="9" fill="#6b7280">지정 센터로 전달</text>

  <rect x="512" y="42" width="180" height="226" rx="10" fill="none" stroke="#475569" stroke-width="1.4" stroke-dasharray="6,4"/>
  <text x="602" y="62" text-anchor="middle" font-size="11" font-weight="700" font-family="monospace" fill="#475569">upstream</text>

  <g transform="translate(545,78)" stroke="#475569" fill="none" stroke-linejoin="round">
    <path d="M0 24 L38 2 L76 24 Z" fill="#fff4ed" stroke-width="1.6"/>
    <rect x="8" y="24" width="60" height="42" fill="#fff" stroke-width="1.6"/>
    <rect x="30" y="44" width="16" height="22" fill="#fff" stroke-width="1.2"/>
  </g>
  <text x="583" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">서울 센터</text>

  <g transform="translate(545,200)" stroke="#475569" fill="none" stroke-linejoin="round">
    <path d="M0 24 L38 2 L76 24 Z" fill="#fff4ed" stroke-width="1.6"/>
    <rect x="8" y="24" width="60" height="42" fill="#fff" stroke-width="1.6"/>
    <rect x="30" y="44" width="16" height="22" fill="#fff" stroke-width="1.2"/>
  </g>
  <text x="583" y="288" text-anchor="middle" font-size="11" font-weight="600" fill="#0f172a">부산 센터</text>
</svg>
</div>
<div class="caption">그림 3-10. 주소를 확인해(location) 지정 센터로 보내는(proxy_pass) NGINX 설정의 흐름</div>

</html>
