<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minikube Architecture</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #fff;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .diagram {
            background-color: #fff;
            border: 2.5px solid #1565c0;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 950px;
            box-shadow: 0 0 0 4px rgba(21,101,192,0.08);
        }
        .minikube-container {
            background-color: #fff;
            border: 2.5px solid #1565c0;
            border-radius: 8px;
            padding: 20px;
        }
        .minikube-label {
            background-color: #1565c0;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
            display: inline-block;
        }
        .inner-content {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .control-plane {
            background-color: #fff;
            border: 2px solid #c62828;
            border-radius: 6px;
            padding: 14px;
            box-shadow: 0 0 0 2px rgba(198,40,40,0.1);
        }
        .control-plane-label {
            background-color: #c62828;
            color: #fff;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
            display: inline-block;
        }
        .api-server {
            font-size: 12px;
            font-weight: 600;
            color: #c62828;
            text-align: center;
        }
        .divider {
            height: 1px;
            background-color: #ddd;
        }
        .worker-node {
            background-color: #fff;
            border: 2px solid #1565c0;
            border-radius: 6px;
            padding: 14px;
        }
        .worker-label {
            background-color: #1565c0;
            color: #fff;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
            display: inline-block;
        }
        .component-row {
            display: flex;
            gap: 8px;
        }
        .component {
            flex: 1;
            background-color: #fff;
            border: 2px solid #1565c0;
            border-radius: 4px;
            padding: 8px;
            font-size: 11px;
            font-weight: 500;
            color: #333;
            text-align: center;
        }
        .layer-divider {
            height: 2px;
            background: repeating-linear-gradient(90deg, #1565c0 0px, #1565c0 8px, transparent 8px, transparent 16px);
            margin: 15px 0;
        }
        .layer-title {
            font-size: 11px;
            font-weight: 600;
            color: #666;
            padding: 10px 0;
            text-align: center;
        }
        .hardware-section {
            background-color: #f5f5f5;
            border: 2px solid #999;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
            font-size: 11px;
            font-weight: 500;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="diagram">
        <div class="minikube-container">
            <div class="minikube-label">Minikube</div>

            <div class="inner-content">
                <div class="control-plane">
                    <div class="control-plane-label">컨트롤 플레인</div>
                    <div class="api-server">Kube API Server</div>
                </div>

                <div class="divider"></div>

                <div class="worker-node">
                    <div class="worker-label">단일 노드</div>
                    <div class="component-row">
                        <div class="component">kubelet</div>
                        <div class="component">kube-proxy</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="layer-divider"></div>

        <div class="layer-title">컨테이너 엔진</div>

        <div class="layer-divider"></div>

        <div class="layer-title">호스트 OS</div>

        <div class="layer-divider"></div>

        <div class="hardware-section">
            하드웨어
        </div>
    </div>
</body>
</html>
