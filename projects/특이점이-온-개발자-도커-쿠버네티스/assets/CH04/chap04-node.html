<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Node Architecture</title>
    <style>
        body {
            margin: 0;
            padding: 40px 20px;
            background-color: #fff;
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .diagram {
            background-color: #fff;
            border: 2.5px solid #1565c0;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 1000px;
            box-shadow: 0 0 0 4px rgba(21,101,192,0.08);
        }
        .nodes-container {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }
        .node-box {
            flex: 1;
            background-color: #fff;
            border: 2.5px solid #c62828;
            border-radius: 8px;
            padding: 16px;
            box-shadow: 0 0 0 2px rgba(198,40,40,0.1);
        }
        .node-label {
            background-color: #c62828;
            color: #fff;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 12px;
            display: inline-block;
        }
        .node-section {
            margin-bottom: 12px;
        }
        .section-title {
            font-size: 11px;
            font-weight: 600;
            color: #666;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid #ddd;
        }
        .process-row {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
        }
        .process {
            flex: 1;
            background-color: #fff;
            border: 1.5px solid #1565c0;
            border-radius: 4px;
            padding: 6px;
            font-size: 10px;
            font-weight: 500;
            color: #333;
            text-align: center;
        }
        .divider {
            height: 1px;
            background-color: #ddd;
            margin: 8px 0;
        }
        .os-section {
            background-color: #f5f5f5;
            border: 1.5px solid #999;
            border-radius: 4px;
            padding: 8px;
            text-align: center;
            font-size: 11px;
            font-weight: 500;
            color: #333;
        }
        .isolation-note {
            background-color: #fff3e0;
            border: 1.5px solid #c62828;
            border-radius: 6px;
            padding: 12px;
            text-align: center;
            font-size: 11px;
            color: #c62828;
            font-weight: 500;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="diagram">
        <div class="nodes-container">
            <div class="node-box">
                <div class="node-label">노드 1</div>

                <div class="node-section">
                    <div class="section-title">프로세스</div>
                    <div class="process-row">
                        <div class="process">프로세스</div>
                    </div>
                    <div class="process-row">
                        <div class="process">프로세스</div>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="node-section">
                    <div class="os-section">OS</div>
                </div>
            </div>

            <div class="node-box">
                <div class="node-label">노드 2</div>

                <div class="node-section">
                    <div class="section-title">프로세스</div>
                    <div class="process-row">
                        <div class="process">프로세스</div>
                    </div>
                    <div class="process-row">
                        <div class="process">프로세스</div>
                    </div>
                </div>

                <div class="divider"></div>

                <div class="node-section">
                    <div class="os-section">OS</div>
                </div>
            </div>
        </div>

        <div class="isolation-note">
            각 노드는 독립적인 OS와 프로세스를 가집니다.
        </div>
    </div>
</body>
</html>
