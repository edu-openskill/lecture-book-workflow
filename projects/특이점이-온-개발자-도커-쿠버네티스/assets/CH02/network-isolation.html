<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>푸드코트 네트워크 격리 비유</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fff;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  }
  .diagram {
    background: #fff;
    border: 2.5px solid #333;
    border-radius: 10px;
    padding: 24px 28px 20px;
    width: 480px;
  }
  .title {
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: #333;
    margin-bottom: 16px;
    letter-spacing: 1px;
  }

  /* 푸드코트 전체 */
  .foodcourt {
    border: 2.5px solid #333;
    border-radius: 8px;
    overflow: hidden;
  }

  /* 식당 줄 */
  .shop-row {
    display: flex;
    background: #fafafa;
  }
  .shop {
    flex: 1;
    padding: 16px 8px 14px;
    text-align: center;
    position: relative;
  }
  .shop:not(:last-child) {
    border-right: 4px solid #555;
  }
  .shop-name {
    font-size: 12px;
    font-weight: 700;
    color: #333;
    margin-bottom: 8px;
  }
  .shop-inside {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  /* 요리사 */
  .chef {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .chef-hat {
    width: 12px;
    height: 6px;
    border: 1.5px solid #555;
    border-bottom: none;
    border-radius: 3px 3px 0 0;
    background: #fff;
    margin-bottom: -2px;
  }
  .chef-head {
    width: 14px;
    height: 14px;
    border: 2px solid #555;
    border-radius: 50%;
    background: #fff;
  }
  .chef-body {
    width: 20px;
    height: 12px;
    border: 2px solid #555;
    border-top: none;
    border-radius: 0 0 7px 7px;
    background: #fff;
    margin-top: -1px;
  }
  .shop-menu {
    font-size: 9px;
    color: #888;
  }

  /* 픽업 창구 바 */
  .pickup-bar {
    display: flex;
    border-top: 2.5px solid #555;
    border-bottom: 2.5px solid #555;
    background: #e8e8e8;
  }
  .pickup {
    flex: 1;
    text-align: center;
    padding: 6px 0;
    font-size: 10px;
    font-weight: 600;
    color: #555;
    position: relative;
  }
  .pickup:not(:last-child) {
    border-right: 1px dashed #999;
  }
  .pickup-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border: 1.5px solid #555;
    border-radius: 50%;
    background: #fff;
    margin-right: 4px;
    vertical-align: middle;
  }

  /* 홀 (좌석 공간) */
  .hall {
    background: #fff;
    padding: 18px 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
  }
  .hall-label {
    font-size: 13px;
    font-weight: 700;
    color: #333;
  }
  /* 테이블 */
  .tables {
    display: flex;
    gap: 16px;
  }
  .table {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .table-top {
    width: 28px;
    height: 18px;
    border: 2px solid #888;
    border-radius: 4px;
    background: #f0f0f0;
  }
  .chairs {
    display: flex;
    gap: 4px;
  }
  .chair {
    width: 8px;
    height: 8px;
    border: 1.5px solid #888;
    border-radius: 50%;
    background: #f5f5f5;
  }

  /* 범례 */
  .legend {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1.5px dashed #ccc;
  }
  .legend-item {
    font-size: 11px;
    color: #666;
    font-weight: 600;
  }
  .legend-item span {
    color: #333;
    font-weight: 700;
  }
</style>
</head>
<body>
<div class="diagram">
  <div class="title">푸드코트 평면도</div>

  <div class="foodcourt">
    <!-- 식당들 -->
    <div class="shop-row">
      <div class="shop">
        <div class="shop-name">A식당</div>
        <div class="shop-inside">
          <div class="chef">
            <div class="chef-hat"></div>
            <div class="chef-head"></div>
            <div class="chef-body"></div>
          </div>
          <div class="shop-menu">짜장면</div>
        </div>
      </div>
      <div class="shop">
        <div class="shop-name">B식당</div>
        <div class="shop-inside">
          <div class="chef">
            <div class="chef-hat"></div>
            <div class="chef-head"></div>
            <div class="chef-body"></div>
          </div>
          <div class="shop-menu">돈까스</div>
        </div>
      </div>
      <div class="shop">
        <div class="shop-name">C식당</div>
        <div class="shop-inside">
          <div class="chef">
            <div class="chef-hat"></div>
            <div class="chef-head"></div>
            <div class="chef-body"></div>
          </div>
          <div class="shop-menu">라면</div>
        </div>
      </div>
    </div>

    <!-- 픽업 창구 -->
    <div class="pickup-bar">
      <div class="pickup"><span class="pickup-dot"></span>픽업</div>
      <div class="pickup"><span class="pickup-dot"></span>픽업</div>
      <div class="pickup"><span class="pickup-dot"></span>픽업</div>
    </div>

    <!-- 홀 -->
    <div class="hall">
      <div class="hall-label">홀</div>
      <div class="tables">
        <div class="table">
          <div class="table-top"></div>
          <div class="chairs">
            <div class="chair"></div>
            <div class="chair"></div>
          </div>
        </div>
        <div class="table">
          <div class="table-top"></div>
          <div class="chairs">
            <div class="chair"></div>
            <div class="chair"></div>
          </div>
        </div>
        <div class="table">
          <div class="table-top"></div>
          <div class="chairs">
            <div class="chair"></div>
            <div class="chair"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="legend">
    <div class="legend-item"><span>식당</span> = 컨테이너</div>
    <div class="legend-item"><span>픽업 창구</span> = veth pair</div>
    <div class="legend-item"><span>홀</span> = docker0</div>
  </div>
</div>
</body>
</html>
