<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>docker run 흐름 - 커널이 컨테이너를 만든다</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 36px 24px;
    background: #fff;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    color: #222;
  }
  .diagram {
    background: #fff;
    border: 2.5px solid #1565c0;
    border-radius: 12px;
    padding: 30px 30px 24px;
    width: 920px;
    box-shadow: 0 0 0 4px rgba(21,101,192,0.08);
  }
  .scene {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
  }

  .node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .node-svg {
    width: 90px;
    height: 80px;
  }
  .node-label {
    font-size: 13px;
    font-weight: 800;
    color: #1565c0;
    text-align: center;
    line-height: 1.3;
  }

  /* OS 커널 — 핵심: 빨강·주황 강조 */
  .kernel-node .node-label {
    color: #c62828;
  }

  /* 화살표 영역 */
  .arrow-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-width: 90px;
    padding: 0 4px;
  }
  .arrow-label {
    font-size: 12px;
    font-weight: 700;
    color: #1565c0;
    margin-bottom: 4px;
    text-align: center;
    line-height: 1.3;
    white-space: nowrap;
  }
  .arrow-area svg {
    width: 100%;
    height: 14px;
  }
  .kernel-arrow .arrow-label {
    color: #c62828;
  }
  .kernel-arrow svg line {
    stroke: #c62828;
  }
  .kernel-arrow svg polygon {
    fill: #c62828;
  }
</style>
</head>
<body>
<div class="diagram">
  <div class="scene">
    <!-- 1. 터미널 (docker run 명령어) -->
    <div class="node">
      <svg class="node-svg" viewBox="0 0 90 80">
        <rect x="6" y="14" width="78" height="56" rx="4" fill="#fff" stroke="#1565c0" stroke-width="2.5"/>
        <line x1="6" y1="26" x2="84" y2="26" stroke="#1565c0" stroke-width="1.5"/>
        <circle cx="13" cy="20" r="2" fill="#1565c0"/>
        <circle cx="20" cy="20" r="2" fill="#1565c0"/>
        <circle cx="27" cy="20" r="2" fill="#1565c0"/>
        <text x="14" y="48" font-family="Consolas, monospace" font-size="11" font-weight="700" fill="#1565c0">&gt;_</text>
        <text x="14" y="60" font-family="Consolas, monospace" font-size="9" fill="#1565c0">docker run</text>
      </svg>
      <div class="node-label">docker run<br>명령어</div>
    </div>

    <!-- 화살표 1 -->
    <div class="arrow-area">
      <span class="arrow-label">전달</span>
      <svg viewBox="0 0 100 14" preserveAspectRatio="none">
        <line x1="0" y1="7" x2="86" y2="7" stroke="#1565c0" stroke-width="2"/>
        <polygon points="86,2 100,7 86,12" fill="#1565c0"/>
      </svg>
    </div>

    <!-- 2. Docker Engine -->
    <div class="node">
      <svg class="node-svg" viewBox="0 0 90 80">
        <rect x="14" y="14" width="62" height="14" rx="2" fill="#f5faff" stroke="#1565c0" stroke-width="2"/>
        <circle cx="20" cy="21" r="1.5" fill="#1565c0"/>
        <rect x="14" y="32" width="62" height="14" rx="2" fill="#f5faff" stroke="#1565c0" stroke-width="2"/>
        <circle cx="20" cy="39" r="1.5" fill="#1565c0"/>
        <rect x="14" y="50" width="62" height="14" rx="2" fill="#f5faff" stroke="#1565c0" stroke-width="2"/>
        <circle cx="20" cy="57" r="1.5" fill="#1565c0"/>
        <line x1="45" y1="64" x2="45" y2="72" stroke="#1565c0" stroke-width="2"/>
      </svg>
      <div class="node-label">Docker<br>Engine</div>
    </div>

    <!-- 화살표 2 (커널 강조) -->
    <div class="arrow-area kernel-arrow">
      <span class="arrow-label">격리된<br>프로세스 요청</span>
      <svg viewBox="0 0 100 14" preserveAspectRatio="none">
        <line x1="0" y1="7" x2="86" y2="7" stroke-width="2" stroke-dasharray="4 3"/>
        <polygon points="86,2 100,7 86,12"/>
      </svg>
    </div>

    <!-- 3. OS 커널 (핵심) -->
    <div class="node kernel-node">
      <svg class="node-svg" viewBox="0 0 90 80">
        <path d="M 18 38 Q 8 38 8 30 Q 8 20 22 20 Q 24 12 38 12 Q 50 6 60 14 Q 76 12 78 24 Q 86 28 86 36 Q 86 46 70 46 Z"
              fill="#fff3e0" stroke="#c62828" stroke-width="2.5"/>
        <rect x="30" y="50" width="30" height="20" rx="2" fill="#fff" stroke="#c62828" stroke-width="2"/>
        <line x1="36" y1="56" x2="54" y2="56" stroke="#c62828" stroke-width="1"/>
        <line x1="36" y1="60" x2="54" y2="60" stroke="#c62828" stroke-width="1"/>
        <line x1="36" y1="64" x2="50" y2="64" stroke="#c62828" stroke-width="1"/>
      </svg>
      <div class="node-label">OS 커널</div>
    </div>

    <!-- 화살표 3 (커널 강조) -->
    <div class="arrow-area kernel-arrow">
      <span class="arrow-label">프로세스<br>생성</span>
      <svg viewBox="0 0 100 14" preserveAspectRatio="none">
        <line x1="0" y1="7" x2="86" y2="7" stroke-width="2"/>
        <polygon points="86,2 100,7 86,12"/>
      </svg>
    </div>

    <!-- 4. 컨테이너 -->
    <div class="node">
      <svg class="node-svg" viewBox="0 0 90 80">
        <polygon points="20,30 70,30 78,22 28,22" fill="#f5faff" stroke="#1565c0" stroke-width="2"/>
        <polygon points="70,30 70,68 78,60 78,22" fill="#fff" stroke="#1565c0" stroke-width="2"/>
        <rect x="20" y="30" width="50" height="38" fill="#f5faff" stroke="#1565c0" stroke-width="2"/>
        <line x1="36" y1="30" x2="36" y2="68" stroke="#1565c0" stroke-width="1"/>
        <line x1="54" y1="30" x2="54" y2="68" stroke="#1565c0" stroke-width="1"/>
      </svg>
      <div class="node-label">컨테이너</div>
    </div>
  </div>
</div>
</body>
</html>
