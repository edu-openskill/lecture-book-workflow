<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>컨테이너 가상화 구조</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #fff;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  }
  .diagram {
    background: #fff;
    border: 2px solid #333;
    border-radius: 12px;
    padding: 30px 30px 20px;
    width: 520px;
  }
  .containers {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
  }
  .container-box {
    flex: 1;
    border: 2px solid #555;
    border-radius: 8px;
    padding: 12px 8px 10px;
    background: #fafafa;
    text-align: center;
  }
  .container-label {
    font-size: 13px;
    font-weight: 700;
    color: #333;
    margin-bottom: 10px;
  }
  .icons {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 8px;
  }
  .icon {
    width: 36px;
    height: 36px;
    border: 1.5px solid #888;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fff;
  }
  .icon svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: #555;
    stroke-width: 1.5;
  }
  .lib-bar {
    background: #e8e8e8;
    border: 1.5px solid #888;
    border-radius: 4px;
    padding: 4px 0;
    font-size: 11px;
    color: #555;
    font-weight: 600;
  }
  .layer {
    border: 2px solid #555;
    border-radius: 8px;
    padding: 10px 0;
    text-align: center;
    font-size: 14px;
    font-weight: 700;
    color: #333;
    margin-bottom: 12px;
    background: #f0f0f0;
  }
  .layer:last-child {
    margin-bottom: 0;
  }
  .host-os {
    padding: 10px 12px;
  }
  .host-os-label {
    font-size: 14px;
    font-weight: 700;
    color: #333;
    margin-bottom: 8px;
  }
  .kernel-box {
    border: 1.5px solid #333;
    border-radius: 6px;
    padding: 6px 0;
    background: #d9e4f0;
    font-size: 12px;
    font-weight: 700;
    color: #222;
  }
  .kernel-sub {
    font-size: 11px;
    font-weight: 500;
    color: #444;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="diagram">
  <div class="containers">
    <div class="container-box">
      <div class="container-label">컨테이너 1</div>
      <div class="icons">
        <div class="icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </div>
        <div class="icon">
          <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><text x="12" y="15" text-anchor="middle" font-size="9" fill="#555" stroke="none" font-weight="bold">App</text></svg>
        </div>
        <div class="icon">
          <svg viewBox="0 0 24 24"><polyline points="7 8 3 12 7 16"/><polyline points="17 8 21 12 17 16"/><line x1="14" y1="4" x2="10" y2="20"/></svg>
        </div>
      </div>
      <div class="lib-bar">Library</div>
    </div>
    <div class="container-box">
      <div class="container-label">컨테이너 2</div>
      <div class="icons">
        <div class="icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </div>
        <div class="icon">
          <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><text x="12" y="15" text-anchor="middle" font-size="9" fill="#555" stroke="none" font-weight="bold">App</text></svg>
        </div>
        <div class="icon">
          <svg viewBox="0 0 24 24"><polyline points="7 8 3 12 7 16"/><polyline points="17 8 21 12 17 16"/><line x1="14" y1="4" x2="10" y2="20"/></svg>
        </div>
      </div>
      <div class="lib-bar">Library</div>
    </div>
    <div class="container-box">
      <div class="container-label">컨테이너 3</div>
      <div class="icons">
        <div class="icon">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>
        </div>
        <div class="icon">
          <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><text x="12" y="15" text-anchor="middle" font-size="9" fill="#555" stroke="none" font-weight="bold">App</text></svg>
        </div>
        <div class="icon">
          <svg viewBox="0 0 24 24"><polyline points="7 8 3 12 7 16"/><polyline points="17 8 21 12 17 16"/><line x1="14" y1="4" x2="10" y2="20"/></svg>
        </div>
      </div>
      <div class="lib-bar">Library</div>
    </div>
  </div>
  <div class="layer">도커 엔진</div>
  <div class="layer host-os">
    <div class="host-os-label">호스트 OS</div>
    <div class="kernel-box">
      커널 (Kernel)
      <div class="kernel-sub">컨테이너 격리 공간 생성 · 모든 컨테이너가 공유</div>
    </div>
  </div>
  <div class="layer">하드웨어</div>
</div>
</body>
</html>
