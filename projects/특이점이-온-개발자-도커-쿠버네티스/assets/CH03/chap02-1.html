<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dockerfile → 이미지 → 컨테이너</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 36px 24px;
    background: #fff;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    color: #222;
  }
  .diagram {
    background: #fff;
    border: 2.5px solid #1565c0;
    border-radius: 12px;
    padding: 30px 36px 26px;
    width: 880px;
    box-shadow: 0 0 0 4px rgba(21,101,192,0.08);
  }
  .scene {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .node {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .node-svg {
    width: 100px;
    height: 90px;
  }
  .node-label {
    font-size: 14px;
    font-weight: 800;
    color: #1565c0;
  }
  /* 컨테이너 — 핵심: 빨강·주황 강조 */
  .container-node .node-label {
    color: #c62828;
  }
  .arrows {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    min-width: 130px;
    padding: 0 6px;
  }
  .arrow-label {
    font-size: 13px;
    font-weight: 700;
    color: #1565c0;
    margin-bottom: 4px;
    font-family: 'Consolas', monospace;
  }
  .arrows svg {
    width: 100%;
    height: 14px;
  }
</style>
</head>
<body>
<div class="diagram">
  <div class="scene">
    <!-- Dockerfile -->
    <div class="node">
      <svg class="node-svg" viewBox="0 0 100 90">
        <path d="M 22 12 L 64 12 L 82 30 L 82 78 L 22 78 Z"
              fill="#fff" stroke="#1565c0" stroke-width="2.5" stroke-linejoin="round"/>
        <path d="M 64 12 L 64 30 L 82 30" fill="none" stroke="#1565c0" stroke-width="2.5" stroke-linejoin="round"/>
        <line x1="32" y1="42" x2="72" y2="42" stroke="#1565c0" stroke-width="1.5"/>
        <line x1="32" y1="50" x2="72" y2="50" stroke="#1565c0" stroke-width="1.5"/>
        <line x1="32" y1="58" x2="72" y2="58" stroke="#1565c0" stroke-width="1.5"/>
        <line x1="32" y1="66" x2="58" y2="66" stroke="#1565c0" stroke-width="1.5"/>
      </svg>
      <div class="node-label">Dockerfile</div>
    </div>

    <!-- 화살표 1 -->
    <div class="arrows">
      <span class="arrow-label">docker build</span>
      <svg viewBox="0 0 130 14" preserveAspectRatio="none">
        <line x1="0" y1="7" x2="116" y2="7" stroke="#1565c0" stroke-width="2"/>
        <polygon points="116,2 130,7 116,12" fill="#1565c0"/>
      </svg>
    </div>

    <!-- 이미지 (레이어 스택) -->
    <div class="node">
      <svg class="node-svg" viewBox="0 0 100 90">
        <polygon points="20,30 80,30 90,42 30,42" fill="#f5faff" stroke="#1565c0" stroke-width="2.2"/>
        <polygon points="20,46 80,46 90,58 30,58" fill="#fff" stroke="#1565c0" stroke-width="2.2"/>
        <polygon points="20,62 80,62 90,74 30,74" fill="#f5faff" stroke="#1565c0" stroke-width="2.2"/>
      </svg>
      <div class="node-label">이미지</div>
    </div>

    <!-- 화살표 2 -->
    <div class="arrows">
      <span class="arrow-label">docker run</span>
      <svg viewBox="0 0 130 14" preserveAspectRatio="none">
        <line x1="0" y1="7" x2="116" y2="7" stroke="#1565c0" stroke-width="2"/>
        <polygon points="116,2 130,7 116,12" fill="#1565c0"/>
      </svg>
    </div>

    <!-- 컨테이너 (핵심) -->
    <div class="node container-node">
      <svg class="node-svg" viewBox="0 0 100 90">
        <rect x="14" y="22" width="72" height="56" rx="3" fill="#fff3e0" stroke="#c62828" stroke-width="2.5"/>
        <line x1="28" y1="22" x2="28" y2="78" stroke="#c62828" stroke-width="1.5"/>
        <line x1="44" y1="22" x2="44" y2="78" stroke="#c62828" stroke-width="1.5"/>
        <line x1="60" y1="22" x2="60" y2="78" stroke="#c62828" stroke-width="1.5"/>
        <line x1="76" y1="22" x2="76" y2="78" stroke="#c62828" stroke-width="1.5"/>
      </svg>
      <div class="node-label">컨테이너</div>
    </div>
  </div>
</div>
</body>
</html>
