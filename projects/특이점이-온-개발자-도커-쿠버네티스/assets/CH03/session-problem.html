<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세션 불일치 문제</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 36px 24px;
    background: #fff;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    color: #222;
  }
  .diagram {
    background: #fff;
    border: 2.5px solid #1565c0;
    border-radius: 12px;
    padding: 30px 36px 26px;
    width: 880px;
    box-shadow: 0 0 0 4px rgba(21,101,192,0.08);
  }
  .scene {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  /* 사용자 */
  .user {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .user-svg { width: 70px; height: 70px; }
  .user-label {
    font-size: 14px;
    font-weight: 800;
    color: #1565c0;
  }

  /* 화살표 영역 */
  .flows {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 24px;
    min-width: 220px;
  }
  .flow-row {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .flow-label {
    font-size: 13px;
    font-weight: 700;
    color: #1565c0;
    margin-bottom: 4px;
  }
  .flow-row svg {
    width: 100%;
    height: 14px;
  }
  .flow-row.fail .flow-label { color: #c62828; }

  /* 서버 박스 */
  .servers {
    display: flex;
    flex-direction: column;
    gap: 22px;
    flex-shrink: 0;
  }
  .server {
    width: 180px;
    border: 2px solid #1565c0;
    border-radius: 8px;
    background: #f5faff;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    box-shadow: 0 0 0 2px rgba(21,101,192,0.08);
  }
  .server.problem {
    border: 2.5px solid #c62828;
    background: #fff3e0;
    box-shadow: 0 0 0 2px rgba(198,40,40,0.10);
  }
  .server-svg { width: 38px; height: 38px; flex-shrink: 0; }
  .server-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .server-name {
    font-size: 13px;
    font-weight: 800;
    color: #1565c0;
  }
  .server.problem .server-name { color: #c62828; }
  .server-state {
    font-size: 11px;
    color: #1565c0;
    font-weight: 600;
  }
  .server.problem .server-state { color: #c62828; }
</style>
</head>
<body>
<div class="diagram">
  <div class="scene">
    <!-- 사용자 -->
    <div class="user">
      <svg class="user-svg" viewBox="0 0 70 70">
        <circle cx="35" cy="22" r="13" fill="#fff" stroke="#1565c0" stroke-width="2.5"/>
        <path d="M 12 64 Q 12 42 35 42 Q 58 42 58 64 Z"
              fill="#f5faff" stroke="#1565c0" stroke-width="2.5"/>
      </svg>
      <div class="user-label">사용자</div>
    </div>

    <!-- 흐름 화살표 2개 -->
    <div class="flows">
      <div class="flow-row">
        <span class="flow-label">1. 로그인</span>
        <svg viewBox="0 0 220 14" preserveAspectRatio="none">
          <line x1="0" y1="7" x2="206" y2="7" stroke="#1565c0" stroke-width="2"/>
          <polygon points="206,2 220,7 206,12" fill="#1565c0"/>
        </svg>
      </div>
      <div class="flow-row fail">
        <span class="flow-label">2. 다음 요청 → 실패</span>
        <svg viewBox="0 0 220 14" preserveAspectRatio="none">
          <line x1="0" y1="7" x2="206" y2="7" stroke="#c62828" stroke-width="2" stroke-dasharray="5 4"/>
          <polygon points="206,2 220,7 206,12" fill="#c62828"/>
        </svg>
      </div>
    </div>

    <!-- 서버 박스 2개 -->
    <div class="servers">
      <div class="server">
        <svg class="server-svg" viewBox="0 0 38 38">
          <rect x="6" y="6" width="26" height="8" rx="1.5" fill="#fff" stroke="#1565c0" stroke-width="2"/>
          <circle cx="11" cy="10" r="1" fill="#1565c0"/>
          <rect x="6" y="16" width="26" height="8" rx="1.5" fill="#fff" stroke="#1565c0" stroke-width="2"/>
          <circle cx="11" cy="20" r="1" fill="#1565c0"/>
          <rect x="6" y="26" width="26" height="8" rx="1.5" fill="#fff" stroke="#1565c0" stroke-width="2"/>
          <circle cx="11" cy="30" r="1" fill="#1565c0"/>
        </svg>
        <div class="server-info">
          <span class="server-name">서버 1</span>
          <span class="server-state">세션 저장됨</span>
        </div>
      </div>
      <div class="server problem">
        <svg class="server-svg" viewBox="0 0 38 38">
          <rect x="6" y="6" width="26" height="8" rx="1.5" fill="#fff" stroke="#c62828" stroke-width="2"/>
          <circle cx="11" cy="10" r="1" fill="#c62828"/>
          <rect x="6" y="16" width="26" height="8" rx="1.5" fill="#fff" stroke="#c62828" stroke-width="2"/>
          <circle cx="11" cy="20" r="1" fill="#c62828"/>
          <rect x="6" y="26" width="26" height="8" rx="1.5" fill="#fff" stroke="#c62828" stroke-width="2"/>
          <circle cx="11" cy="30" r="1" fill="#c62828"/>
        </svg>
        <div class="server-info">
          <span class="server-name">서버 2</span>
          <span class="server-state">세션 없음</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
