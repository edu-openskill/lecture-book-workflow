<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  html, body { margin: 0; padding: 0; background: transparent; }
  body {
    padding: 24px;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: inline-block;
    width: 100%;
    box-sizing: border-box;
  }
  .browser {
    width: 720px;
    margin: 0 auto;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    border: 1px solid #d0d0d0;
    background: #ffffff;
  }
  .titlebar {
    background: #e8e8e8;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #c8c8c8;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .dot.red { background: #ff5f57; }
  .dot.yellow { background: #ffbd2e; }
  .dot.green { background: #28c940; }
  .urlbar {
    flex: 1;
    background: #fff;
    border: 1px solid #d0d0d0;
    border-radius: 14px;
    padding: 5px 14px;
    font-size: 12px;
    color: #333;
    margin-left: 12px;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  iframe {
    width: 100%;
    height: 80px;
    border: none;
    display: block;
    background: #fff;
  }
</style>
</head>
<body>
  <div class="browser">
    <div class="titlebar">
      <div class="dot red"></div>
      <div class="dot yellow"></div>
      <div class="dot green"></div>
      <div class="urlbar">localhost/order</div>
    </div>
    <iframe src="http://localhost/order"></iframe>
  </div>
</body>
</html>
