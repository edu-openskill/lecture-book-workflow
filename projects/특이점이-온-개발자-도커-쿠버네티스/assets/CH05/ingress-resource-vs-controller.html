<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ingress 리소스 vs Ingress Controller</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    padding: 44px 20px;
    background: #fff;
    font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
    color: #222;
  }
  .diagram { width: 960px; }
  .title {
    font-size: 16px;
    font-weight: 800;
    text-align: center;
    margin-bottom: 26px;
  }

  .row {
    display: flex;
    align-items: stretch;
    gap: 6px;
  }
  .col-left {
    flex: 1;
    display: flex; flex-direction: column; align-items: center;
  }
  .col-middle {
    width: 130px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .col-right {
    flex: 1;
    display: flex; flex-direction: column; align-items: center;
  }

  /* --- Outer request --- */
  .outer-badge {
    border: 2px solid #222;
    border-radius: 20px;
    padding: 8px 26px;
    font-size: 13px;
    font-weight: 800;
    background: #fff;
  }
  .outer-paths {
    font-size: 11px;
    color: #666;
    font-family: 'Consolas', 'Malgun Gothic', monospace;
    margin-top: 6px;
  }
  .down-arrow {
    width: 2px; height: 28px;
    background: #333;
    position: relative;
    margin: 6px auto 0;
  }
  .down-arrow::after {
    content: '';
    position: absolute; left: -5px; bottom: -3px;
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 10px solid #333;
  }
  .down-arrow.red { background: #c62828; }
  .down-arrow.red::after { border-top-color: #c62828; }

  /* --- Box shared --- */
  .box {
    width: 100%;
    max-width: 360px;
    border-radius: 12px;
    background: #fff;
    overflow: hidden;
  }
  .box-head {
    color: #fff;
    padding: 8px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .box-body {
    padding: 16px 18px 18px;
  }
  .box-name {
    font-size: 15px;
    font-weight: 800;
  }
  .box-sub {
    font-size: 11px;
    color: #666;
    margin-top: 3px;
  }
  .box-text {
    margin-top: 12px;
    font-size: 11.5px;
    color: #444;
    line-height: 1.6;
  }

  /* Controller (red) */
  .controller-box {
    border: 2.5px solid #c62828;
    box-shadow: 0 0 0 4px rgba(198,40,40,0.1);
  }
  .controller-box .box-head { background: #c62828; }
  .controller-box .box-name { color: #c62828; }

  .pods {
    margin-top: 12px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .pod {
    width: 30px; height: 30px;
    border: 1.5px solid #888;
    border-radius: 50%;
    background: #fff;
    position: relative;
  }
  .pod::after {
    content: '';
    position: absolute; right: 3px; top: 3px;
    width: 6px; height: 6px; border-radius: 50%;
    background: #4caf50;
  }

  /* Resource (blue) */
  .resource-box {
    border: 2.5px solid #1565c0;
    box-shadow: 0 0 0 4px rgba(21,101,192,0.1);
  }
  .resource-box .box-head { background: #1565c0; }
  .resource-box .box-name { color: #1565c0; }

  .yaml-block {
    margin-top: 12px;
    background: #f4f7fb;
    border: 1px solid #d9e2ee;
    border-radius: 6px;
    padding: 10px 12px;
    font-family: 'Consolas', monospace;
    font-size: 11px;
    line-height: 1.7;
    color: #333;
  }
  .yaml-block .arrow-inline { color: #888; }

  /* --- Middle arrow --- */
  .middle-arrow {
    display: flex; flex-direction: column; align-items: center; gap: 8px;
  }
  .middle-arrow-label {
    font-size: 11px;
    color: #555;
    font-weight: 700;
    text-align: center;
    line-height: 1.35;
    background: #fff;
    padding: 2px 6px;
  }
  .middle-arrow svg {
    width: 108px;
    height: 22px;
  }

  /* --- Services branch --- */
  .fork-svg {
    width: 340px;
    height: 60px;
    display: block;
    margin: 0 auto;
  }
  .services-fork {
    width: 340px;
    display: flex;
    justify-content: space-between;
    margin-top: -2px;
  }
  .service {
    border: 2px solid #444;
    border-radius: 22px;
    padding: 10px 22px;
    font-size: 12px;
    font-weight: 700;
    background: #fff;
  }
</style>
</head>
<body>

<div class="diagram">
  <div class="title">Ingress 리소스(YAML)와 Ingress Controller(Pod) — 선언과 집행</div>

  <!-- Top row: outer request -->
  <div class="row">
    <div class="col-left">
      <div class="outer-badge">외부 요청</div>
      <div class="outer-paths">/order · /stores</div>
      <div class="down-arrow"></div>
    </div>
    <div class="col-middle"></div>
    <div class="col-right"></div>
  </div>

  <!-- Main row: Controller | arrow | Resource -->
  <div class="row">
    <div class="col-left">
      <div class="box controller-box">
        <div class="box-head">집행 · 실제 요청 처리</div>
        <div class="box-body">
          <div class="box-name">Ingress Controller</div>
          <div class="box-sub">클러스터 안에서 도는 Pod</div>
          <div class="pods">
            <div class="pod"></div>
            <div class="pod"></div>
          </div>
          <div class="box-text">
            외부 요청을 받아 규칙대로 Service에 전달
          </div>
        </div>
      </div>
    </div>

    <div class="col-middle">
      <div class="middle-arrow">
        <div class="middle-arrow-label">규칙을<br>읽음</div>
        <svg viewBox="0 0 108 22">
          <line x1="106" y1="11" x2="14" y2="11" stroke="#666" stroke-width="2" stroke-dasharray="6,4"/>
          <polygon points="14,4 2,11 14,18" fill="#666"/>
        </svg>
      </div>
    </div>

    <div class="col-right">
      <div class="box resource-box">
        <div class="box-head">선언 · 라우팅 규칙</div>
        <div class="box-body">
          <div class="box-name">Ingress 리소스</div>
          <div class="box-sub">YAML 문서</div>
          <div class="yaml-block">
path: /order&nbsp;&nbsp;&nbsp;<span class="arrow-inline">→</span> order-service<br>
path: /stores&nbsp;&nbsp;<span class="arrow-inline">→</span> stores-service
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom row: branch to services -->
  <div class="row">
    <div class="col-left">
      <svg class="fork-svg" viewBox="0 0 340 60">
        <line x1="170" y1="0" x2="170" y2="18" stroke="#c62828" stroke-width="2.2"/>
        <line x1="56" y1="18" x2="284" y2="18" stroke="#c62828" stroke-width="2.2"/>
        <line x1="56" y1="18" x2="56" y2="50" stroke="#c62828" stroke-width="2.2"/>
        <polygon points="51,44 56,58 61,44" fill="#c62828"/>
        <line x1="284" y1="18" x2="284" y2="50" stroke="#c62828" stroke-width="2.2"/>
        <polygon points="279,44 284,58 289,44" fill="#c62828"/>
      </svg>
      <div class="services-fork">
        <div class="service">order-service</div>
        <div class="service">stores-service</div>
      </div>
    </div>
    <div class="col-middle"></div>
    <div class="col-right"></div>
  </div>
</div>

</body>
</html>
