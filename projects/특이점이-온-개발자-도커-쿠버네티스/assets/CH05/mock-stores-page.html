<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
  }
  body {
    padding: 20px;
    display: inline-block;
    width: 100%;
    box-sizing: border-box;
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
  .browser {
    width: 560px;
    margin: 0 auto;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #d8d2c5;
    background: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .chrome {
    background: #f4f1ec;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #d8d2c5;
  }
  .nav {
    display: flex;
    gap: 6px;
    color: #6b6258;
    font-size: 14px;
  }
  .nav span { display: inline-block; padding: 0 4px; }
  .urlbar {
    flex: 1;
    background: #ffffff;
    border: 1px solid #d8d2c5;
    border-radius: 12px;
    padding: 4px 12px;
    color: #444;
    font-size: 12px;
    font-family: 'Menlo', 'Monaco', monospace;
  }
  .urlbar::before {
    content: 'ⓘ ';
    color: #888;
  }
  .body {
    padding: 22px 28px 28px 28px;
    color: #1a1a1a;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 4px 0 18px 0;
  }
  table {
    border-collapse: collapse;
  }
  th {
    text-align: left;
    font-weight: 700;
    padding-right: 32px;
    padding-bottom: 6px;
    font-size: 14px;
  }
  td {
    padding: 2px 32px 2px 0;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="browser">
  <div class="chrome">
    <div class="nav"><span>←</span><span>→</span><span>⟳</span></div>
    <div class="urlbar">localhost/stores</div>
  </div>
  <div class="body">
    <h1>매장 안내</h1>
    <table>
      <tr><th>지점</th><th>주소</th></tr>
      <tr><td>강남점</td><td>서울 강남구 테헤란로 123</td></tr>
      <tr><td>홍대점</td><td>서울 마포구 홍익로 45</td></tr>
      <tr><td>판교점</td><td>경기 성남시 판교역로 88</td></tr>
    </table>
  </div>
</div>
</body>
</html>
