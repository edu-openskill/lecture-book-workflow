<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');

  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
  }
  body {
    padding: 20px;
    display: inline-block;
    width: 100%;
    box-sizing: border-box;
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  }
  .browser {
    width: 560px;
    margin: 0 auto;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #d8d2c5;
    background: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .chrome {
    background: #f4f1ec;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #d8d2c5;
    color: #5b5247;
    font-size: 14px;
  }
  .nav {
    display: flex;
    gap: 6px;
    color: #6b6258;
    font-size: 14px;
  }
  .nav span {
    display: inline-block;
    padding: 0 4px;
  }
  .urlbar {
    flex: 1;
    background: #ffffff;
    border: 1px solid #d8d2c5;
    border-radius: 12px;
    padding: 4px 12px;
    color: #444;
    font-size: 12px;
    font-family: 'Menlo', 'Monaco', monospace;
  }
  .urlbar::before {
    content: 'ⓘ ';
    color: #888;
  }
  .body {
    padding: 22px 28px 28px 28px;
    font-family: 'Noto Sans KR', sans-serif;
    color: #1a1a1a;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 4px 0 18px 0;
  }
  h2 {
    font-size: 17px;
    font-weight: 700;
    margin: 0 0 10px 0;
    color: #1a1a1a;
  }
  table {
    border-collapse: collapse;
    margin-top: 4px;
  }
  th {
    text-align: left;
    font-weight: 700;
    padding-right: 28px;
    padding-bottom: 4px;
    font-size: 14px;
  }
  td {
    padding: 2px 28px 2px 0;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="browser">
  <div class="chrome">
    <div class="nav"><span>←</span><span>→</span><span>⟳</span></div>
    <div class="urlbar">localhost/order</div>
  </div>
  <div class="body">
    <h1>주문 접수 완료</h1>
    <h2>치킨버거 1개</h2>
    <table>
      <tr><th>품목</th><th>수량</th><th>금액</th></tr>
      <tr><td>치킨버거</td><td>1</td><td>5,500원</td></tr>
    </table>
  </div>
</div>
</body>
</html>
