<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Pod의 공유 네트워크</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
  }

  .diagram {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Pod */
  .pod-box {
    border: 1.5px solid #222;
    border-radius: 12px;
    padding: 28px 32px 24px;
    background: #fff;
    position: relative;
  }
  .pod-label {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    padding: 3px 16px;
    border-radius: 5px;
    white-space: nowrap;
  }

  .pod-body {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    margin-top: 8px;
  }

  /* Network Namespace */
  .ns-box {
    border: 1.5px dashed #222;
    border-radius: 10px;
    padding: 24px 28px 20px;
    background: #f8f8f8;
    position: relative;
  }
  .ns-label {
    position: absolute;
    top: -11px;
    left: 50%;
    transform: translateX(-50%);
    background: #f8f8f8;
    font-size: 11px;
    font-weight: 700;
    color: #444;
    padding: 0 10px;
    white-space: nowrap;
  }

  .ns-ip {
    text-align: center;
    font-size: 12px;
    font-weight: 700;
    color: #222;
    margin-top: 4px;
    margin-bottom: 14px;
  }

  /* 컨테이너들 */
  .containers {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
  }

  .container {
    border: 1.5px solid #222;
    border-radius: 8px;
    padding: 10px 18px;
    background: #fff;
    text-align: center;
  }
  .container.pause {
    border-style: dashed;
    background: #e8e8e8;
  }
  .container-name {
    font-size: 12px;
    font-weight: 700;
    color: #222;
  }
  .container-desc {
    font-size: 9px;
    color: #666;
    margin-top: 2px;
  }

  /* localhost */
  .localhost-bar {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0 6px;
  }
  .localhost-arrow {
    font-size: 16px;
    color: #222;
  }
  .localhost-label {
    font-size: 9px;
    font-weight: 600;
    color: #555;
    background: #fff;
    padding: 2px 8px;
    border-radius: 3px;
    border: 1px solid #ddd;
    white-space: nowrap;
  }
</style>
</head>
<body>

<div class="diagram">
  <div class="pod-box">
    <div class="pod-label">Pod</div>

    <div class="pod-body">

      <div class="ns-box">
        <div class="ns-label">Network Namespace (IP: 10.10.10.10)</div>

        <div class="containers">
          <div class="container pause">
            <div class="container-name">pause</div>
            <div class="container-desc">네트워크 고정</div>
          </div>

          <div style="width: 24px;"></div>

          <div class="container">
            <div class="container-name">nginx</div>
            <div class="container-desc">:80</div>
          </div>

          <div class="localhost-bar">
            <div class="localhost-arrow">←</div>
            <div class="localhost-label">localhost</div>
            <div class="localhost-arrow">→</div>
          </div>

          <div class="container">
            <div class="container-name">redis</div>
            <div class="container-desc">:6379</div>
          </div>
        </div>

      </div>

    </div>
  </div>
</div>

</body>
</html>
