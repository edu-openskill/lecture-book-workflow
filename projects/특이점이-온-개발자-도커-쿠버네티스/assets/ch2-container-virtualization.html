<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>컨테이너 가상화 구조</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
  }

  .outer {
    display: flex;
    gap: 6px;
  }

  /* 왼쪽 브래킷 영역 — 테이블 레이아웃으로 정확히 맞춤 */
  .brackets {
    display: flex;
    flex-direction: column;
  }
  .bracket {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .bracket-line {
    width: 8px;
    border-left: 1.5px solid #222;
    border-top: 1.5px solid #222;
    border-bottom: 1.5px solid #222;
    align-self: stretch;
  }
  .bracket-label {
    font-size: 11px;
    font-weight: 700;
    color: #222;
    white-space: nowrap;
    writing-mode: vertical-rl;
    text-orientation: upright;
  }

  /* 스택 */
  .stack {
    width: 340px;
    display: flex;
    flex-direction: column;
  }

  .layer {
    border: 1.5px solid #222;
    text-align: center;
    font-size: 16px;
    font-weight: 700;
    color: #222;
  }

  .container-area {
    display: flex;
    gap: 16px;
    justify-content: center;
    padding: 20px 24px;
    border: 1.5px solid #222;
    border-radius: 12px 12px 0 0;
    background: #fff;
  }

  .container {
    border: 1.5px solid #222;
    border-radius: 8px;
    width: 120px;
    overflow: hidden;
    background: #fff;
  }
  .container-header {
    background: #e0e0e0;
    color: #222;
    padding: 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 700;
    border-bottom: 1.5px solid #222;
  }
  .container-body {
    padding: 8px 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .container-item {
    border: 1.5px solid #222;
    border-radius: 5px;
    background: #f5f5f5;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 600;
    text-align: center;
    color: #222;
  }

  .layer-engine { background: #e8e8e8; padding: 16px; border-top: 3px dotted #666; }
  .layer-os { background: #d9d9d9; padding: 16px; border-top: none; }
  .layer-hw { background: #f5f5f5; padding: 16px; border-top: 3px dotted #666; border-radius: 0 0 12px 12px; }
</style>
</head>
<body>

<div class="outer">

  <!-- 브래킷 -->
  <div class="brackets">
    <!-- 애플리케이션 계층: container-area 높이 + 도커엔진 높이 -->
    <div class="bracket" id="b-app">
      <div class="bracket-line"></div>
      <span class="bracket-label">애플리케이션 계층</span>
    </div>
    <!-- OS 계층: 호스트 OS 높이 -->
    <div class="bracket" id="b-os">
      <div class="bracket-line"></div>
      <span class="bracket-label">OS 계층</span>
    </div>
    <!-- 하드웨어 계층: 하드웨어 높이 -->
    <div class="bracket" id="b-hw">
      <div class="bracket-line"></div>
      <span class="bracket-label">하드웨어 계층</span>
    </div>
  </div>

  <!-- 스택 -->
  <div class="stack">
    <div class="container-area" id="s-containers">
      <div class="container">
        <div class="container-header">컨테이너 1</div>
        <div class="container-body">
          <div class="container-item">App</div>
          <div class="container-item">Library</div>
        </div>
      </div>
      <div class="container">
        <div class="container-header">컨테이너 2</div>
        <div class="container-body">
          <div class="container-item">App</div>
          <div class="container-item">Library</div>
        </div>
      </div>
    </div>
    <div class="layer layer-engine" id="s-engine">도커 엔진</div>
    <div class="layer layer-os" id="s-os">호스트 OS</div>
    <div class="layer layer-hw" id="s-hw">하드웨어</div>
  </div>

</div>

<script>
  // 스택 요소의 실제 높이에 맞춰 브래킷 높이 동기화
  function sync() {
    const cH = document.getElementById('s-containers').offsetHeight;
    const eH = document.getElementById('s-engine').offsetHeight;
    const oH = document.getElementById('s-os').offsetHeight;
    const hH = document.getElementById('s-hw').offsetHeight;

    document.getElementById('b-app').style.height = cH + 'px';
    document.getElementById('b-os').style.height = (eH + oH) + 'px';
    document.getElementById('b-hw').style.height = hH + 'px';
  }
  window.addEventListener('load', sync);
  window.addEventListener('resize', sync);
</script>

</body>
</html>
