<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Pod 생성 — pause와 Network Namespace</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
  }
  .diagram {
    position: relative;
    width: 580px;
    height: 180px;
  }

  /* kubelet */
  .kubelet {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    border: 1.5px solid #222;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 700;
    color: #222;
    background: #fff;
  }

  /* Pod */
  .pod-box {
    position: absolute;
    right: 0;
    top: 0;
    width: 340px;
    height: 180px;
    border: 1.5px solid #222;
    border-radius: 12px;
    background: #fff;
  }
  .pod-label {
    position: absolute;
    top: -14px;
    left: 50%;
    transform: translateX(-50%);
    background: #222;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    padding: 3px 16px;
    border-radius: 5px;
  }

  /* Network Namespace */
  .ns-box {
    position: absolute;
    left: 20px;
    top: 28px;
    right: 20px;
    bottom: 20px;
    border: 1.5px dashed #222;
    border-radius: 10px;
    background: #f5f5f5;
  }
  .ns-label {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    background: #f5f5f5;
    font-size: 10px;
    font-weight: 700;
    color: #444;
    padding: 0 8px;
    white-space: nowrap;
  }

  /* pause */
  .pause-box {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    border: 1.5px dashed #222;
    border-radius: 6px;
    padding: 10px 24px;
    background: #e8e8e8;
    font-size: 12px;
    font-weight: 700;
    color: #222;
    margin-top: 4px;
  }

  /* SVG 화살표 */
  .arrow-svg {
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="diagram">

  <div class="kubelet">kubelet</div>

  <div class="pod-box">
    <div class="pod-label">Pod</div>
    <div class="ns-box">
      <div class="ns-label">Network Namespace (IP: 10.10.10.10)</div>
      <div class="pause-box">pause</div>
    </div>
  </div>

  <svg class="arrow-svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#222"/>
      </marker>
    </defs>
    <line x1="100" y1="90" x2="370" y2="90"
          stroke="#222" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </svg>

</div>

</body>
</html>
