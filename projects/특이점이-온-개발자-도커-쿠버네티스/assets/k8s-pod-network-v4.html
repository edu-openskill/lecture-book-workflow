<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Pod 네트워크 — 안 4: 나란히 + 공유 네트워크</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
  }

  .diagram {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Pod */
  .pod-box {
    border: 1.5px solid #222;
    border-radius: 12px;
    padding: 28px 32px 24px;
    background: #fff;
    position: relative;
  }
  .pod-label {
    position: absolute;
    top: -14px;
    left: 24px;
    background: #222;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    padding: 3px 16px;
    border-radius: 5px;
  }

  .pod-body {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-top: 8px;
  }

  /* 컨테이너들 */
  .containers {
    display: flex;
    gap: 14px;
    justify-content: center;
  }
  .container {
    border: 1.5px solid #222;
    border-radius: 8px;
    padding: 14px 20px;
    background: #fff;
    text-align: center;
    min-width: 120px;
  }
  .container.pause {
    border-style: dashed;
    background: #f5f5f5;
  }
  .container-name {
    font-size: 13px;
    font-weight: 700;
    color: #222;
  }
  .container-desc {
    font-size: 10px;
    color: #666;
    margin-top: 4px;
  }
  .container-order {
    font-size: 9px;
    font-weight: 600;
    color: #999;
    margin-bottom: 4px;
  }

  /* 공유 네트워크 영역 */
  .shared-network {
    border: 1.5px solid #222;
    border-radius: 8px;
    background: #f0f0f0;
    padding: 14px 24px;
    text-align: center;
    position: relative;
  }
  .shared-network-label {
    position: absolute;
    top: -10px;
    left: 16px;
    background: #f0f0f0;
    font-size: 10px;
    font-weight: 700;
    color: #555;
    padding: 0 6px;
  }
  .shared-network-body {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .network-item {
    font-size: 12px;
    font-weight: 600;
    color: #222;
  }
  .network-divider {
    font-size: 12px;
    color: #999;
  }

  /* localhost 통신 */
  .localhost-area {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 2px 0;
  }
  .localhost-label-box {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .localhost-arrow {
    font-size: 18px;
    color: #222;
  }
  .localhost-text {
    font-size: 11px;
    font-weight: 600;
    color: #555;
    background: #fff;
    padding: 2px 10px;
    border-radius: 4px;
    border: 1px solid #ddd;
  }
</style>
</head>
<body>

<div class="diagram">
  <div class="pod-box">
    <div class="pod-label">Pod</div>

    <div class="pod-body">

      <!-- 3개 컨테이너 나란히 -->
      <div class="containers">
        <div class="container pause">
          <div class="container-order">① 먼저 생성</div>
          <div class="container-name">pause</div>
          <div class="container-desc">네트워크를<br>만들고 유지</div>
        </div>
        <div class="container">
          <div class="container-order">② 합류</div>
          <div class="container-name">nginx</div>
          <div class="container-desc">:80</div>
        </div>
        <div class="container">
          <div class="container-order">③ 합류</div>
          <div class="container-name">redis</div>
          <div class="container-desc">:6379</div>
        </div>
      </div>

      <!-- localhost 통신 -->
      <div class="localhost-area">
        <div class="localhost-label-box">
          <div class="localhost-arrow">←</div>
          <div class="localhost-text">localhost로 직접 통신</div>
          <div class="localhost-arrow">→</div>
        </div>
      </div>

      <!-- 공유 네트워크 -->
      <div class="shared-network">
        <div class="shared-network-label">공유 네트워크 공간</div>
        <div class="shared-network-body">
          <div class="network-item">IP: 10.244.0.5</div>
          <div class="network-divider">|</div>
          <div class="network-item">포트: 80, 6379</div>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
