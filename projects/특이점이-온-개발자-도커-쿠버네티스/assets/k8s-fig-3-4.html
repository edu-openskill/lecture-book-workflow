<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>워커 노드에서 kubelet과 kube-proxy의 역할</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
    background: #fff;
    display: flex;
    justify-content: center;
    padding: 48px 20px;
  }

  .diagram {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  /* 컨트롤 플레인 */
  .cp-box {
    border: 1.5px dashed #222;
    border-radius: 12px;
    padding: 20px 24px 24px;
    background: #fff;
    position: relative;
    text-align: center;
  }
  .cp-label {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: #444;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 12px;
    border-radius: 4px;
    white-space: nowrap;
  }
  .cp-inner {
    border: 1.5px solid #222;
    border-radius: 6px;
    padding: 12px 18px;
    margin-top: 6px;
    font-size: 12px;
    font-weight: 700;
    color: #222;
  }

  /* 큰 화살표 */
  .big-arrow {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .big-arrow-line { font-size: 24px; color: #222; }
  .big-arrow-label { font-size: 10px; font-weight: 600; color: #666; white-space: nowrap; }

  /* 워커 노드 */
  .worker-box {
    border: 1.5px solid #222;
    border-radius: 12px;
    padding: 24px 28px 28px;
    background: #fff;
    position: relative;
  }
  .worker-label {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: #444;
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 12px;
    border-radius: 4px;
    white-space: nowrap;
  }

  .worker-body {
    display: flex;
    flex-direction: column;
    gap: 20px;
    margin-top: 6px;
  }

  /* 각 행 */
  .role-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .comp {
    border: 1.5px solid #222;
    border-radius: 6px;
    padding: 10px 16px;
    background: #fff;
    text-align: center;
  }
  .comp-name {
    font-size: 12px;
    font-weight: 700;
    color: #222;
  }
  .comp-desc {
    font-size: 9px;
    color: #666;
    margin-top: 2px;
  }

  .small-arrow { font-size: 18px; color: #222; }

  /* Pod */
  .pod {
    border: 1.5px solid #222;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    color: #222;
    background: #fff;
  }
  .pod.selected {
    border-width: 2.5px;
    background: #e8e8e8;
  }
  .pod.dim {
    color: #bbb;
    border-color: #bbb;
  }

  .pods { display: flex; gap: 8px; }

  /* 외부 요청 */
  .external {
    border: 1.5px dashed #222;
    border-radius: 6px;
    padding: 8px 14px;
    background: #f5f5f5;
    text-align: center;
  }
  .external-name { font-size: 10px; font-weight: 700; color: #222; }
  .external-desc { font-size: 9px; color: #666; margin-top: 1px; }

  /* 구분선 */
  .divider {
    border-top: 1px dashed #ccc;
    width: 100%;
  }
</style>
</head>
<body>

<div class="diagram">

  <!-- 컨트롤 플레인 -->
  <div class="cp-box">
    <div class="cp-label">컨트롤 플레인</div>
    <div class="cp-inner">Kube API Server</div>
  </div>

  <div class="big-arrow">
    <div class="big-arrow-line">→</div>
    <div class="big-arrow-label">작업 전달</div>
  </div>

  <!-- 워커 노드 -->
  <div class="worker-box">
    <div class="worker-label">워커 노드</div>

    <div class="worker-body">

      <!-- kubelet -->
      <div class="role-row">
        <div class="comp">
          <div class="comp-name">kubelet</div>
          <div class="comp-desc">컨테이너 생성/관리</div>
        </div>
        <div class="small-arrow">→</div>
        <div class="pods">
          <div class="pod">Pod A</div>
          <div class="pod">Pod B</div>
          <div class="pod">Pod C</div>
        </div>
      </div>

      <div class="divider"></div>

      <!-- kube-proxy -->
      <div class="role-row">
        <div class="comp">
          <div class="comp-name">kube-proxy</div>
          <div class="comp-desc">어디로 보낼까?</div>
        </div>
        <div class="small-arrow">→</div>
        <div class="pods">
          <div class="pod dim">Pod A</div>
          <div class="pod selected">Pod B</div>
          <div class="pod dim">Pod C</div>
        </div>
      </div>

    </div>
  </div>

</div>

</body>
</html>
