<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>그림 1-8 — A 계단형 (상세 / 학습내용 포함)</title>
<style>
  body{font-family:-apple-system,"Segoe UI","Malgun Gothic",sans-serif;background:#f8fafc;color:#1e293b;margin:0;padding:40px 24px 80px;}
  .wrap{max-width:1240px;margin:0 auto;}
  h1{font-size:21px;color:#0f172a;margin:0 0 6px;}
  .sub{color:#6b7280;font-size:13px;margin-bottom:26px;}
  .sample{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:22px 24px 26px;}
  .cap{text-align:center;font-size:12px;color:#6b7280;margin-top:12px;font-style:italic;}
  .svg-figure{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:14px;}
  svg{display:block;width:100%;height:auto;}
</style>
</head>
<body>
<div class="wrap">
  <h1>그림 1-8 · 학습 흐름 — 상세안 (각 단계에서 무엇을 만드는지 + 한계로 다음 단계)</h1>
  <p class="sub">아이콘 1개가 아니라, 그 챕터에서 실제로 짜는 구조를 작은 도식으로. 단계가 오를수록 구성이 늘어 시스템이 성장한다. 사람 없음.</p>
  <div class="sample">
    <div class="svg-figure">
    <svg viewBox="0 0 1240 720" role="img" aria-label="네 단계 계단형 학습 흐름. CH02 REST로 4개 서비스 연결과 보상, CH03 클린 아키텍처와 K8s, CH04 Kafka 메시지와 지휘자로 분리, CH05 WebSocket 실시간 알림. 각 단계 사이에 앞 챕터의 한계가 적혀 다음 단계로 올라간다.">
      <defs>
        <marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#4f46e5"/></marker>
        <marker id="arw" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#ff7849"/></marker>
        <marker id="arv" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L7,3 z" fill="#7c3aed"/></marker>
      </defs>

      <!-- 계단 기둥 -->
      <rect x="20"  y="470" width="290" height="230" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
      <rect x="330" y="360" width="290" height="340" rx="6" fill="#eef2ff" stroke="#e0e7ff"/>
      <rect x="640" y="250" width="290" height="450" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
      <rect x="950" y="140" width="290" height="560" rx="6" fill="#eef2ff" stroke="#e0e7ff"/>
      <line x1="10" y1="700" x2="1240" y2="700" stroke="#cbd5e1" stroke-width="1.4"/>

      <!-- ===== STEP 1 · CH02 ===== -->
      <g>
        <rect x="32" y="478" width="266" height="208" rx="9" fill="#fff" stroke="#cbd5e1" stroke-width="1.6"/>
        <circle cx="58" cy="504" r="13" fill="#ff7849"/><text x="58" y="509" text-anchor="middle" font-size="12" font-weight="800" fill="#fff">1</text>
        <text x="80" y="500" font-size="11.5" font-weight="700" fill="#6b7280">CH02 · 동기</text>
        <text x="80" y="516" font-size="13.5" font-weight="800" fill="#0f172a">REST + 보상 트랜잭션</text>
        <!-- 도식: 4서비스 직접 호출 -->
        <g font-size="9" font-weight="700" fill="#334155" text-anchor="middle">
          <rect x="48"  y="540" width="50" height="26" rx="4" fill="#fff" stroke="#94a3b8"/><text x="73" y="557">주문</text>
          <rect x="118" y="540" width="50" height="26" rx="4" fill="#fff" stroke="#94a3b8"/><text x="143" y="557">상품</text>
          <rect x="188" y="540" width="50" height="26" rx="4" fill="#fff" stroke="#94a3b8"/><text x="213" y="557">배달</text>
        </g>
        <line x1="98" y1="553" x2="116" y2="553" stroke="#4f46e5" stroke-width="1.6" marker-end="url(#ar)"/>
        <line x1="168" y1="553" x2="186" y2="553" stroke="#4f46e5" stroke-width="1.6" marker-end="url(#ar)"/>
        <path d="M213 568 Q 143 600 73 568" fill="none" stroke="#ff7849" stroke-width="1.6" stroke-dasharray="4,3" marker-end="url(#arw)"/>
        <text x="143" y="598" text-anchor="middle" font-size="9.5" font-weight="700" fill="#9a3412">실패 시 보상 (되돌리기)</text>
        <text x="48" y="640" font-size="10.5" fill="#475569">배우는 것 — 4개 서비스를 REST로</text>
        <text x="48" y="656" font-size="10.5" fill="#475569">직접 연결하고, 실패하면 보상으로 되돌린다</text>
      </g>

      <!-- ===== STEP 2 · CH03 ===== -->
      <g>
        <rect x="342" y="368" width="266" height="208" rx="9" fill="#fff" stroke="#cbd5e1" stroke-width="1.6"/>
        <circle cx="368" cy="394" r="13" fill="#ff7849"/><text x="368" y="399" text-anchor="middle" font-size="12" font-weight="800" fill="#fff">2</text>
        <text x="390" y="390" font-size="11.5" font-weight="700" fill="#6b7280">CH03 · 운영</text>
        <text x="390" y="406" font-size="13.5" font-weight="800" fill="#0f172a">DDD · 클린 + K8s</text>
        <!-- 도식: 클린아키텍처 링 + K8s 경계 -->
        <rect x="356" y="424" width="238" height="86" rx="8" fill="none" stroke="#4f46e5" stroke-width="1.4" stroke-dasharray="6,4"/>
        <text x="364" y="438" font-size="9" font-weight="700" fill="#3730a3">Kubernetes 클러스터</text>
        <circle cx="430" cy="474" r="30" fill="none" stroke="#4f46e5" stroke-width="1.6"/>
        <circle cx="430" cy="474" r="19" fill="none" stroke="#4f46e5" stroke-width="1.4"/>
        <rect x="423" y="467" width="14" height="14" rx="2" fill="#4f46e5"/>
        <text x="500" y="470" font-size="9.5" fill="#334155">도메인 중심</text>
        <text x="500" y="486" font-size="9.5" fill="#334155">계층 분리</text>
        <text x="354" y="540" font-size="10.5" fill="#475569">배우는 것 — 같은 코드를 도메인 중심</text>
        <text x="354" y="556" font-size="10.5" fill="#475569">클린 아키텍처로 정리하고 K8s에 올린다</text>
      </g>

      <!-- ===== STEP 3 · CH04 ===== -->
      <g>
        <rect x="652" y="258" width="266" height="208" rx="9" fill="#fff" stroke="#cbd5e1" stroke-width="1.6"/>
        <circle cx="678" cy="284" r="13" fill="#ff7849"/><text x="678" y="289" text-anchor="middle" font-size="12" font-weight="800" fill="#fff">3</text>
        <text x="700" y="280" font-size="11.5" font-weight="700" fill="#6b7280">CH04 · 비동기</text>
        <text x="700" y="296" font-size="13.5" font-weight="800" fill="#0f172a">Kafka + Saga(지휘자)</text>
        <!-- 도식: 서비스 - Kafka바 - 지휘자 -->
        <g font-size="9" font-weight="700" fill="#334155" text-anchor="middle">
          <rect x="668" y="312" width="46" height="22" rx="4" fill="#fff" stroke="#94a3b8"/><text x="691" y="327">주문</text>
          <rect x="730" y="312" width="46" height="22" rx="4" fill="#fff" stroke="#94a3b8"/><text x="753" y="327">상품</text>
          <rect x="792" y="312" width="46" height="22" rx="4" fill="#fff" stroke="#94a3b8"/><text x="815" y="327">배달</text>
        </g>
        <rect x="668" y="352" width="170" height="20" rx="3" fill="#fff4ed" stroke="#ff7849" stroke-width="1.4"/>
        <text x="753" y="366" text-anchor="middle" font-size="9" font-weight="700" fill="#9a3412">Kafka 토픽</text>
        <line x1="691" y1="334" x2="691" y2="351" stroke="#4f46e5" stroke-width="1.4" stroke-dasharray="3,2" marker-end="url(#ar)"/>
        <line x1="815" y1="351" x2="815" y2="335" stroke="#4f46e5" stroke-width="1.4" marker-end="url(#ar)"/>
        <rect x="724" y="386" width="90" height="22" rx="11" fill="#c7d2fe" stroke="#4f46e5" stroke-width="1.2"/>
        <text x="769" y="401" text-anchor="middle" font-size="9" font-weight="700" fill="#312e81">지휘자(Saga)</text>
        <line x1="753" y1="372" x2="760" y2="385" stroke="#4f46e5" stroke-width="1.4" marker-end="url(#ar)"/>
        <text x="664" y="432" font-size="10.5" fill="#475569">배우는 것 — 동기 호출을 끊고 Kafka</text>
        <text x="664" y="448" font-size="10.5" fill="#475569">메시지 + 지휘자(Saga)로 분리한다</text>
      </g>

      <!-- ===== STEP 4 · CH05 ===== -->
      <g>
        <rect x="962" y="148" width="266" height="208" rx="9" fill="#fff" stroke="#4f46e5" stroke-width="1.9"/>
        <circle cx="988" cy="174" r="13" fill="#ff7849"/><text x="988" y="179" text-anchor="middle" font-size="12" font-weight="800" fill="#fff">4</text>
        <text x="1010" y="170" font-size="11.5" font-weight="700" fill="#3730a3">CH05 · 실시간</text>
        <text x="1010" y="186" font-size="13.5" font-weight="800" fill="#0f172a">WebSocket Push</text>
        <!-- 도식: 완성형 + WS push to client -->
        <rect x="978" y="206" width="150" height="20" rx="3" fill="#fff4ed" stroke="#ff7849" stroke-width="1.3"/>
        <text x="1053" y="220" text-anchor="middle" font-size="9" font-weight="700" fill="#9a3412">Kafka 토픽</text>
        <rect x="978" y="238" width="60" height="24" rx="4" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.4"/>
        <text x="1008" y="254" text-anchor="middle" font-size="9" font-weight="700" fill="#3730a3">주문</text>
        <rect x="1158" y="238" width="60" height="24" rx="4" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.4"/>
        <text x="1188" y="254" text-anchor="middle" font-size="9" font-weight="700" fill="#6d28d9">사용자</text>
        <line x1="1038" y1="250" x2="1156" y2="250" stroke="#7c3aed" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arv)"/>
        <text x="1098" y="244" text-anchor="middle" font-size="8.5" font-weight="700" fill="#6d28d9">WebSocket Push</text>
        <path d="M1180 226 c-5 -6 -2 -12 2 -12 c4 0 7 6 2 12 z" fill="none" stroke="#7c3aed" stroke-width="1.4"/>
        <text x="976" y="300" font-size="10.5" fill="#475569">배우는 것 — 주문 완료를 WebSocket으로</text>
        <text x="976" y="316" font-size="10.5" fill="#475569">사용자 화면에 즉시 Push한다 (완성)</text>
        <rect x="1052" y="120" width="64" height="22" rx="11" fill="#4f46e5"/><text x="1084" y="135" text-anchor="middle" font-size="11" font-weight="800" fill="#fff">완성</text>
      </g>

      <!-- ===== 상승 화살표 + 한계 칩 ===== -->
      <path d="M310 540 H320 V452 H342" fill="none" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#ar)"/>
      <rect x="300" y="630" width="316" height="26" rx="13" fill="#fff4ed" stroke="#ff7849" stroke-width="1.2"/>
      <text x="458" y="647" text-anchor="middle" font-size="11.5" fill="#9a3412">한계 ① 코드가 뒤엉켜 운영·배포가 버겁다</text>

      <path d="M620 430 H630 V342 H652" fill="none" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#ar)"/>
      <rect x="610" y="520" width="332" height="26" rx="13" fill="#fff4ed" stroke="#ff7849" stroke-width="1.2"/>
      <text x="776" y="537" text-anchor="middle" font-size="11.5" fill="#9a3412">한계 ② 동기 호출이 서로를 기다리다 같이 멈춘다</text>

      <path d="M930 320 H940 V232 H962" fill="none" stroke="#4f46e5" stroke-width="2.2" marker-end="url(#ar)"/>
      <rect x="920" y="410" width="300" height="26" rx="13" fill="#fff4ed" stroke="#ff7849" stroke-width="1.2"/>
      <text x="1070" y="427" text-anchor="middle" font-size="11.5" fill="#9a3412">한계 ③ 끝났는데 사용자가 그걸 모른다</text>

      <text x="20" y="718" font-size="12" fill="#6b7280" font-style="italic">한 단계씩 올라가며 구성이 늘어 시스템이 완성된다 — 각 단계는 앞 단계의 한계에서 출발</text>
    </svg>
    </div>
    <div class="cap">그림 1-8. 이 책의 학습 흐름</div>
  </div>
</div>
</body>
</html>
